const WE1_PROMPTS = [{"prompt":"\"Technology helps more than it harms society.\" Do you agree or disagree?","tag":"Based on Sample"},{"prompt":"\"Homework should be abolished in primary school.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"All students should learn a musical instrument.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Zoos do more harm than good.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"School uniforms should be compulsory at all schools.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Children under 13 should have limited screen time.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Space exploration is worth the cost.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Physical education should be graded the same as academic subjects.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Students should be allowed to use artificial intelligence for homework.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Single-use plastic bags should be completely banned.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Year-round schooling is better than the traditional term system.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Every student should learn to write computer code.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Public transport should be free for all students.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Animals should not be used in scientific experiments.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Social media does more harm than good for young people.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Schools should start at least one hour later in the morning.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Individual sports build character better than team sports.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Libraries are still important in the digital age.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Fast food advertising should be banned during children's television.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Learning a second language should be compulsory from Year 1.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"The voting age should be lowered to sixteen.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Robots will create more jobs than they replace.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Handwriting is still an important skill in the digital age.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Students should be able to choose all their own subjects from Year 5.\" Do you agree or disagree?","tag":"New"},{"prompt":"\"Climate change should be taught as a separate subject in schools.\" Do you agree or disagree?","tag":"New"}];

const HUMANITIES_BANK = {"fiction":[{"title":"Mia at the Robotics Competition","tag":"New","text":"The gymnasium buzzed with excitement as teams from six schools arranged their robots on the competition course. Mia, thirteen, adjusted the wheels on her team's entry, \"Atlas\", and glanced at the obstacle track: a ramp, a narrow bridge, and a target zone at the end.\n\nAcross the hall, she noticed Daniel from Hillcrest Academy kneeling beside his robot, \"Nexus\". It had stalled halfway through its practice run for the third time. Mia walked over. \"What's causing the stall?\" she asked.\n\n\"I think the motor controller is overheating,\" Daniel sighed, turning Nexus on its side. Mia crouched down and traced the wiring with her finger. \"There — that connector is loose. The signal drops every time Nexus turns.\" She pressed the cable firmly back into its socket.\n\nDaniel restarted Nexus. The robot rolled smoothly up the ramp, crossed the bridge without hesitation, and stopped precisely in the target zone. Daniel leapt to his feet. \"You saved us!\"\n\nTheir supervisor, Mr. Okonkwo, had been watching from the judges' table. He approached Mia quietly. \"Your technical instinct is remarkable,\" he said. \"Not many students can diagnose a wiring fault that quickly.\"\n\nLater, while packing up Atlas, Mia found a small sticky note tucked beneath the chassis. It read: \"Check the supply cabinet — Room 14.\" Curious, she slipped away and opened the cabinet. Inside sat a prototype ultrasonic sensor, still in its packaging, labelled \"Regional Robotics Prize — Bonus Component\". None of the other teams had seen it. Mia carried it back to her team, already imagining how it could transform Atlas for the finals.","questions":[{"n":1,"q":"The gymnasium is described as \"buzzing\" because:","o":["the machines were malfunctioning","the lights were flickering","teams were actively preparing","the judges were arguing"],"a":2},{"n":2,"q":"Mia's question to Daniel suggests she is:","o":["bored with the competition","critical of his robot's design","curious and willing to help","eager to leave early"],"a":2},{"n":3,"q":"The loose connector caused Nexus to:","o":["overheat permanently","lose signal during turns","run faster than expected","cross the bridge early"],"a":1},{"n":4,"q":"Mr. Okonkwo's comment about Mia indicates he:","o":["thinks she needs more training","admires her diagnostic ability","is frustrated with Daniel","wants to replace the judges"],"a":1},{"n":5,"q":"The word \"precisely\" in the passage means:","o":["slowly","roughly","exactly","randomly"],"a":2},{"n":6,"q":"Daniel's reaction after the fix shows he is:","o":["upset at Mia's interference","grateful for her help","confused by the result","proud only of his own effort"],"a":1},{"n":7,"q":"The sticky note under Atlas suggests that:","o":["Daniel planted a prank","a hidden opportunity exists","Mia should stop competing","the judges made an error"],"a":1},{"n":8,"q":"Finding the note shows that Mia is:","o":["careless with equipment","impatient during pack-up","observant and attentive","uninterested in details"],"a":2},{"n":9,"q":"The passage is mainly about:","o":["a rivalry between two schools","the rules of robotics competitions","Mia's technical skill and curiosity","Mr. Okonkwo's teaching methods"],"a":2},{"n":10,"q":"The passage suggests the competition atmosphere is:","o":["hostile and unfriendly","dull and uneventful","energetic and collaborative","disorganised and confusing"],"a":2}]},{"title":"The Hidden Mural","tag":"New","text":"Kai's first morning at Riverside Middle School began with the assembly hall gathering. As six hundred students filed in, he noticed something unusual—a large burgundy curtain covered the back wall, completely obscuring whatever lay behind it.\n\nDuring the headmaster's speech, Kai could not stop staring at the covered section. The edges of the curtain revealed hints of colour: bright blues, deep reds, and golds. What was it? Why was it hidden?\n\nAfter assembly, he lingered behind. The halls emptied quickly as students rushed to their first classes. Kai approached the curtain cautiously and lifted one edge. Behind it stretched a mural unlike anything he had seen before—a sprawling landscape of mountains, forests, and animals painted in vibrant detail across the entire wall.\n\nThe colours seemed to glow. Each creature—a wolf, an eagle, a bear—appeared almost alive. In the bottom corner, a small signature read: \"M. Patel, Class of 1997.\"\n\nMs. Rivera, the art teacher, found him standing there, jaw open. Instead of scolding him for being late, she smiled. \"Beautiful, isn't it? Meera Patel painted that twenty-five years ago, right before she left for art school. She later became an award-winning muralist.\"\n\n\"Why is it covered?\" Kai asked.\n\n\"The school is renovating. They wanted to protect it,\" Ms. Rivera explained. \"Would you like to help me create an exhibition about former student artists? We could feature Meera's journey.\"\n\nKai nodded eagerly. He had finally found something that made his new school feel like home.","questions":[{"n":1,"q":"Kai first notices the mural through:","o":["a tour guide's explanation","hints of colour at the curtain's edges","friends pointing it out","a school brochure"],"a":1},{"n":2,"q":"The mural's hidden location suggests it is:","o":["not important to the school","being protected during renovation","waiting to be destroyed","too expensive to display"],"a":1},{"n":3,"q":"Kai's decision to look behind the curtain shows he is:","o":["dishonest and rule-breaking","curious and impulsive","angry at the school","bored with assembly"],"a":1},{"n":4,"q":"Ms. Rivera's response to finding Kai indicates she:","o":["is angry at him","values student curiosity about art","wants him to leave immediately","does not recognise the mural"],"a":1},{"n":5,"q":"The phrase 'each creature appeared almost alive' suggests the artist's:","o":["inexperience with animals","skill in creating realism","confusion about painting","lack of colour knowledge"],"a":1},{"n":6,"q":"Meera Patel became known as a:","o":["teacher","landscape gardener","award-winning muralist","museum curator"],"a":2},{"n":7,"q":"The mural has been covered because:","o":["it is too old","students damaged it","the school is renovating","the artist requested it"],"a":2},{"n":8,"q":"Ms. Rivera's invitation to Kai suggests she believes:","o":["he should be punished","he should join her project","art is not important","he is not trustworthy"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["describe different painting techniques","explain school renovation schedules","show how art can connect a student to a new community","list famous muralists from 1997"],"a":2},{"n":10,"q":"At the end, Kai feels:","o":["afraid of the new school","connected to the school through discovery","upset about the mural","uncertain about his future"],"a":1}]},{"title":"The Time Capsule","tag":"New","text":"Elena was kneeling in the school garden, pulling weeds from the vegetable beds, when her trowel struck something hard. She carefully brushed away the soil and discovered a small metal box, green with age and completely sealed.\n\n\"What is that?\" asked her classmate, Marcus, peering over her shoulder.\n\nElena lifted the box carefully. It was heavier than expected. Carved into its lid were words so worn they were barely visible: \"Sealed 1993. Open 2020.\" It was 2024 now. The box was already overdue.\n\nThey brought it to Principal Mr. Chen, who examined it with great interest. \"This is wonderful,\" he said softly. \"A time capsule from thirty years ago. We should open it together, and then see what's inside.\"\n\nThat evening, with Elena and Marcus watching, Mr. Chen carefully pried open the box. Inside lay letters, photographs, and newspaper clippings. One letter was addressed to \"Future Students.\" It read: \"Dear friends of tomorrow, we hope this finds you well. We buried this time capsule to share our hopes and dreams. Perhaps you will recognise these names, or perhaps you will trace what became of us.\"\n\nThe names belonged to the Class of 1993. Mr. Chen's eyes widened with recognition. \"I taught several of these students,\" he said. \"I can help trace them.\"\n\nOver the next month, Mr. Chen and Elena tracked down former students using old yearbooks and social media. Many had become teachers, doctors, artists, and parents. Mr. Chen organised a reunion, and former students returned to read their own letters aloud. They laughed, cried, and marvelled at how their lives had unfolded since burying the capsule three decades before.","questions":[{"n":1,"q":"Elena discovers the metal box while:","o":["cleaning the school building","weeding the garden beds","searching for buried treasure","digging with Marcus"],"a":1},{"n":2,"q":"The words on the lid indicate the capsule was:","o":["buried in 2020","meant to be opened in 1993","sealed in 1993 for opening in 2020","never meant to be found"],"a":2},{"n":3,"q":"The time capsule was overdue for opening because:","o":["it was lost","it was 2024, not 2020","the school forgot about it","Marcus did not notice it"],"a":1},{"n":4,"q":"The contents of the capsule suggest the original authors wanted to:","o":["hide their secrets forever","share their hopes with future students","bury valuable items","create a mystery"],"a":1},{"n":5,"q":"Mr. Chen recognised some of the names because he:","o":["lived in 1993","had taught those students","went to school with them","kept detailed records"],"a":1},{"n":6,"q":"The tone of the letter to future students is:","o":["sad and regretful","hopeful and friendly","angry and demanding","confused and unclear"],"a":1},{"n":7,"q":"Elena and Mr. Chen traced the former students by using:","o":["old yearbooks and social media","telephone directories","newspaper advertisements","asking random people"],"a":0},{"n":8,"q":"The reunion brought together people who:","o":["had never met before","were no longer friends","wanted to see how their lives had changed","did not recognise each other"],"a":2},{"n":9,"q":"The passage is mainly about:","o":["how to preserve metals properly","celebrating the discovery of a time capsule and reconnecting with the past","teaching gardening skills to students","the history of the school building"],"a":1},{"n":10,"q":"This story suggests that time capsules are valuable because they:","o":["contain money or jewels","provide a bridge between past and present","are easy to find","never deteriorate"],"a":1}]}],"biography":[{"title":"Ada Lovelace: Pioneer of Computing","tag":"Sample","text":"In 1843, a young mathematician named Ada Lovelace attended a prestigious scientific conference in London. The event showcased the latest advancements in computing, and Ada was eager to share her groundbreaking work on Charles Babbage's Analytical Engine.\n\nAda had spent months developing detailed notes that described how the machine could be programmed to perform complex calculations. Her notes included what many consider to be the first algorithm intended for a machine, making her a pioneer in the field of computing.\n\nAt the conference, Ada's presentation was met with a mixture of admiration and scepticism. While some attendees praised her innovative thinking, others doubted the practicality of her ideas. Despite the mixed reception, Ada remained confident in her work.\n\n\"Your vision for this machine is truly extraordinary,\" said Charles Babbage, who had been collaborating with Ada. \"You have seen possibilities that no one else has imagined.\"\n\nAfter the conference, Ada was approached by a publisher who wanted to print her notes. However, Ada declined, choosing instead to continue refining her work. She believed that her notes needed further development before they could be shared with the wider public.\n\nAda's dedication paid off. Her refined notes were eventually published and received widespread acclaim. Today, Ada Lovelace is celebrated as one of the founders of computer science, and her contributions continue to inspire generations of scientists and mathematicians.","questions":[{"n":1,"q":"The passage is set during a time when:","o":["computers were already widespread","computing ideas were just emerging","women commonly led scientific research","algorithms were used in everyday life"],"a":1},{"n":2,"q":"Ada's notes described:","o":["blueprints for building machines","algorithms for computing","speeches for conferences","plans for publishing books"],"a":1},{"n":3,"q":"The scepticism at the conference suggests that some people:","o":["admired Ada's youth","questioned the practicality of her ideas","fully supported her work","ignored her presentation entirely"],"a":1},{"n":4,"q":"When Babbage calls Ada's vision \"extraordinary\", he means she was:","o":["impractical in her thinking","forward-thinking and visionary","careless about details","uninterested in praise"],"a":1},{"n":5,"q":"Ada declined the publisher because she wanted to:","o":["gain more fame first","continue refining her work","earn more money","seek public approval"],"a":1},{"n":6,"q":"Babbage helped Ada by:","o":["publishing her notes himself","encouraging and supporting her ideas","building the Analytical Engine alone","presenting her work at the conference"],"a":1},{"n":7,"q":"The passage suggests Ada's work:","o":["was quickly forgotten","shaped the foundations of computing","caused major controversy","failed to impress anyone"],"a":1},{"n":8,"q":"The word \"acclaim\" most closely means:","o":["criticism","praise","confusion","secrecy"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["describe a scientific conference","highlight Ada Lovelace's contributions","explain how computing machines work","criticise doubters of new ideas"],"a":1},{"n":10,"q":"Ada's story is inspiring because it shows:","o":["instant recognition of talent","perseverance despite obstacles","complete reliance on others","avoidance of challenges"],"a":1}]},{"title":"Mary Anning: The Fossil Hunter","tag":"New","text":"Mary Anning was born in 1799 in Lyme Regis, a small seaside town on the coast of Dorset, England. Her family was poor, and there were few opportunities for girls to receive formal education. However, Mary's curiosity about the natural world could not be stopped.\n\nAt age twelve, Mary made a discovery that would change the history of science. While exploring the cliffs near her home, she uncovered the complete skeleton of an ichthyosaur—a large marine reptile that had lived millions of years before. This find was extraordinary, as almost no one had ever seen such a complete fossil.\n\nWord of her discovery spread through the scientific community. Scientists and collectors travelled to Lyme Regis to meet the remarkable young girl who had found such a treasure. However, Mary faced a serious obstacle: she was a woman in a male-dominated field.\n\nDespite her achievements, many scientists of her time refused to acknowledge her work properly. They took credit for her discoveries, published her findings under male names, or claimed the fossils belonged to other collectors. Mary persisted, continuing to search the cliffs year after year.\n\nOver her lifetime, Mary discovered many important fossils, including a complete plesiosaur skeleton. Her findings revolutionised scientific understanding of prehistoric life. Museums and universities that once ignored her work now proudly display her discoveries.\n\nMary Anning died in 1847 at age forty-seven, never receiving the recognition she deserved during her lifetime. However, her legacy endured. She is now celebrated as one of the greatest palaeontologists in history, and her work laid the foundation for the science of palaeontology itself.","questions":[{"n":1,"q":"Mary Anning's family situation was:","o":["wealthy and well-educated","poor with limited opportunities","involved in scientific work","living in London"],"a":1},{"n":2,"q":"Mary's most famous discovery at age twelve was:","o":["a plesiosaur skeleton","an ichthyosaur skeleton","dinosaur footprints","ancient human remains"],"a":1},{"n":3,"q":"The main obstacle Mary faced was:","o":["difficulty finding fossils","lack of interest from scientists","prejudice against women in science","poor health"],"a":2},{"n":4,"q":"The passage suggests that male scientists:","o":["fully supported Mary's work","often claimed credit for her discoveries","helped her publish her research","lived in Lyme Regis"],"a":1},{"n":5,"q":"Mary's discoveries changed understanding of:","o":["modern sea creatures","human evolution","geological formations","prehistoric life"],"a":3},{"n":6,"q":"The word \"persisted\" most closely means:","o":["gave up easily","continued despite difficulties","moved away from fossils","became discouraged"],"a":1},{"n":7,"q":"Mary's work laid the foundation for:","o":["marine biology alone","geology exclusively","the science of palaeontology","diving expeditions"],"a":2},{"n":8,"q":"Mary's recognition came:","o":["quickly after her first discovery","during her lifetime","long after her death","through wealthy patrons"],"a":2},{"n":9,"q":"The main purpose of this passage is to:","o":["explain how fossils form","describe Lyme Regis geology","highlight Mary Anning's achievements and the prejudice she faced","teach fossil identification"],"a":2},{"n":10,"q":"Mary's story demonstrates that:","o":["science was easy for women","talent and determination can overcome obstacles","fossil hunting is dangerous work","museums do not value discoveries"],"a":1}]},{"title":"Nikola Tesla: Visionary Inventor","tag":"New","text":"Nikola Tesla arrived in New York City in 1884 with a dream and barely any money in his pocket. The Serbian-born inventor had developed a revolutionary design for an electric motor, and he believed America was the place to make his fortune.\n\nTesla first found work with Thomas Edison, the famous inventor of the light bulb. However, the partnership was short-lived. Edison believed in direct current electricity, while Tesla championed alternating current. The two men clashed over their competing visions for powering the world.\n\nAfter leaving Edison's company, Tesla struck out on his own. He partnered with businessman George Westinghouse, who recognised the potential of Tesla's alternating current system. Together, they revolutionised electrical distribution. Alternating current could transmit electricity over long distances far more efficiently than Edison's direct current.\n\nTesla's mind was restless. He dreamed of wireless transmission of electricity and created the first remote-controlled boat. He experimented with X-rays and developed technologies that prefigured modern wireless communication. His laboratories filled with strange machines and crackling experiments.\n\nYet despite his brilliance, Tesla struggled financially. He was a poor businessman and often gave away his ideas or failed to patent his inventions properly. He lived in poverty in his later years, sometimes unable to pay his hotel bills.\n\nToday, Tesla is recognised as one of history's greatest inventors. The alternating current system he developed powers virtually every home and business in the modern world. Scientists and engineers continue to study his notebooks and dreams. Though he died poor and largely forgotten, Nikola Tesla's legacy illuminates our modern world.","questions":[{"n":1,"q":"Tesla arrived in New York with:","o":["a successful business plan","sponsorship from investors","a dream and minimal money","letters of introduction"],"a":2},{"n":2,"q":"Tesla worked with Edison initially to:","o":["develop the light bulb","prove direct current was superior","advance his motor design","study electrical systems"],"a":3},{"n":3,"q":"The major disagreement between Edison and Tesla was about:","o":["who discovered electricity","direct current versus alternating current","the location of factories","patent rights"],"a":1},{"n":4,"q":"George Westinghouse partnered with Tesla because he:","o":["wanted to employ Edison","saw potential in alternating current","was Edison's competitor","needed Tesla's boat design"],"a":1},{"n":5,"q":"Alternating current was superior because it could:","o":["power brighter lights","transmit electricity over long distances more efficiently","be stored easily","work without wires"],"a":1},{"n":6,"q":"Tesla's experiments included work on:","o":["steam engines only","X-rays and wireless communication","light bulb improvements","railway locomotives"],"a":1},{"n":7,"q":"Tesla struggled financially because he was:","o":["not intelligent enough","too expensive to employ","a poor businessman who didn't patent properly","forced to work for Edison"],"a":2},{"n":8,"q":"In his later years, Tesla lived in:","o":["a mansion","poverty, sometimes unable to pay bills","Westinghouse's laboratory","Edison's household"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["explain how electricity works","compare Edison and Westinghouse","describe Tesla's genius and the tragedy of his financial struggles","promote alternating current"],"a":2},{"n":10,"q":"Tesla's legacy today is significant because:","o":["he lived in luxury","his alternating current system powers the modern world","he won many awards during his lifetime","he worked for Edison"],"a":1}]}],"science":[{"title":"Coral Reefs: Rainforests of the Sea","tag":"New","text":"Coral reefs are sometimes called the \"rainforests of the sea\". Although they cover less than one per cent of the ocean floor, they support approximately 25 per cent of all known marine species. Fish, sea turtles, and thousands of invertebrates depend on reefs for food and shelter.\n\nRising ocean temperatures pose the greatest threat to coral health. When water becomes too warm, corals expel the microscopic algae that live inside their tissues. These algae, called zooxanthellae, provide corals with up to 90 per cent of their energy through photosynthesis. Without them, the coral turns white—a process known as bleaching. If temperatures remain high for several weeks, bleached corals can starve and die.\n\nScientists monitor reef health using networks of underwater cameras and temperature sensors placed along reef systems. Satellite imaging also allows researchers to track large-scale bleaching events across entire ocean regions.\n\nMost marine biologists agree that reducing carbon emissions is the single most important step for protecting reefs in the long term. Carbon dioxide released by burning fossil fuels traps heat in the atmosphere, which in turn warms the oceans.\n\nIn the shorter term, researchers are experimenting with breeding heat-resistant coral strains. By selecting corals that naturally tolerate warmer water, scientists hope to create populations that can survive the rising temperatures projected for coming decades. Early trials have shown promising results, but experts caution that no amount of selective breeding can replace the need to address the root cause: global carbon emissions.","questions":[{"n":1,"q":"Coral reefs support approximately what proportion of marine species?","o":["25 per cent","50 per cent","75 per cent","10 per cent"],"a":0},{"n":2,"q":"Bleaching occurs when corals:","o":["absorb too much sunlight","grow in deep water","expel their algae","are covered by sand"],"a":2},{"n":3,"q":"Without zooxanthellae, corals lose their main source of:","o":["water","shelter","movement","energy"],"a":3},{"n":4,"q":"The word \"expel\" most closely means:","o":["attract","force out","protect","dissolve"],"a":1},{"n":5,"q":"Scientists monitor reef health using:","o":["fishing nets and boats","underwater cameras and sensors","coral breeding tanks","fossil fuel detectors"],"a":1},{"n":6,"q":"According to the passage, the key driver of ocean warming is:","o":["underwater volcanoes","algae overgrowth","carbon emissions from fossil fuels","satellite equipment"],"a":2},{"n":7,"q":"Heat-resistant coral strains are created by:","o":["genetic engineering in laboratories","adding chemicals to the water","painting corals white","selecting naturally tolerant corals"],"a":3},{"n":8,"q":"The tone of this passage is best described as:","o":["humorous and light","informative and concerned","angry and accusatory","fictional and imaginative"],"a":1},{"n":9,"q":"The main purpose of the passage is to:","o":["promote coral tourism","explain coral bleaching and its causes","describe underwater camera technology","compare different ocean species"],"a":1},{"n":10,"q":"The passage implies that reef survival ultimately depends on:","o":["building more sensors","breeding all corals in tanks","reducing global carbon emissions","increasing ocean temperatures"],"a":2}]},{"title":"The Monarch Butterfly Migration","tag":"New","text":"Every autumn, millions of monarch butterflies embark on one of nature's most remarkable journeys. Beginning in Canada and the northern United States, these fragile creatures fly thousands of kilometres south to Mexico, seeking the warmth and resources they need to survive the winter.\n\nHow do the monarchs know where to go? Scientists have discovered that these butterflies navigate using a combination of the sun's position and Earth's magnetic field. This internal compass guides them across unfamiliar territory, even though most monarchs making the journey have never completed the migration before. It is a behaviour passed down through their genes.\n\nThe migration is a physical ordeal. Monarchs must fly for several months, covering up to 160 kilometres per day. They stop only to feed on nectar and rest. Many do not survive the journey. Predators, storms, and exhaustion claim countless lives.\n\nOnce they reach their destination in the Mexican forests, monarchs cluster together on trees, covering branches and trunks in a blanket of orange and black. They enter a state of dormancy, conserving energy until spring, when the cycle begins again.\n\nToday, the monarch migration faces serious threats. Habitat loss in both Canada and Mexico has destroyed the meadows and forests that monarchs depend on. Climate change brings unpredictable weather that can devastate populations. A plant called milkweed is essential for monarch caterpillars, yet it is disappearing due to agricultural development and herbicide use.\n\nConservationists are working to protect monarch habitats by planting milkweed and creating wildlife corridors. Many people in North America are planting milkweed gardens to support the monarchs. These efforts offer hope that future generations will continue to witness this extraordinary natural spectacle.","questions":[{"n":1,"q":"The monarch migration occurs mainly:","o":["in spring","during summer","in autumn","in winter"],"a":2},{"n":2,"q":"Monarchs navigate using:","o":["memory of previous journeys","signals from other butterflies","the sun's position and Earth's magnetic field","markings on trees"],"a":2},{"n":3,"q":"Most monarch butterflies migrating south:","o":["have made the journey before","are guided by older butterflies","have never completed this migration before","learn from their parents"],"a":2},{"n":4,"q":"The distance monarchs can fly per day is:","o":["50 kilometres","160 kilometres","300 kilometres","100 kilometres"],"a":1},{"n":5,"q":"In Mexican forests, monarchs:","o":["hibernate in caves","cluster together and enter dormancy","continue flying south","breed and lay eggs"],"a":1},{"n":6,"q":"Milkweed is important because:","o":["monarchs eat its nectar only","it attracts predators away","monarch caterpillars depend on it","it guides their migration"],"a":2},{"n":7,"q":"The main threat to monarchs today is:","o":["predators such as birds","habitat loss and climate change","too much rain","excessive sun exposure"],"a":1},{"n":8,"q":"The tone when describing the migration's hardships is:","o":["unconcerned","hopeful and celebratory","serious and respectful of the challenge","critical and doubtful"],"a":2},{"n":9,"q":"The purpose of this passage is mainly to:","o":["teach butterfly identification","explain the monarch migration and its threats","describe Mexican forests","criticise agricultural practices"],"a":1},{"n":10,"q":"Planting milkweed gardens helps monarchs by:","o":["providing shade","reducing migration distance","creating food sources for caterpillars","attracting more predators"],"a":2}]},{"title":"Earthquakes: Measuring Earth's Tremors","tag":"New","text":"An earthquake occurs when tectonic plates—enormous pieces of Earth's crust—suddenly shift and release energy. These plate movements happen constantly, but most are too small for humans to feel. When a major plate shift occurs, however, the energy released can shake buildings, rupture roads, and alter landscapes permanently.\n\nTo measure earthquakes, scientists use instruments called seismographs. These sensitive devices detect and record the vibrations caused by earthquakes. The recordings produced by seismographs are called seismograms, and they show the magnitude and intensity of the shaking.\n\nEarthquakes produce two main types of seismic waves: P-waves and S-waves. P-waves, or primary waves, are the fastest and arrive first at monitoring stations. They compress the ground like an accordion. S-waves, or secondary waves, arrive later and cause the ground to shake side to side. S-waves are slower but often cause more damage because of their sideways motion.\n\nFor many years, scientists used the Richter scale to measure earthquake magnitude. This scale rates earthquakes from 1 to 10, with higher numbers indicating stronger shaking. However, scientists realised the Richter scale had limitations for very large earthquakes. Modern seismologists now use the moment magnitude scale, which provides more accurate measurements, especially for powerful earthquakes.\n\nEarthquakes can trigger tsunamis, landslides, and fires. In populated areas, they cause tremendous destruction and loss of life. However, scientists cannot predict exactly when earthquakes will occur. What they can do is improve building design and develop early warning systems. These systems detect earthquakes within seconds and can provide precious warning time—sometimes only seconds, but enough to alert people to take shelter before strong shaking arrives.","questions":[{"n":1,"q":"Tectonic plates cause earthquakes when they:","o":["absorb water","suddenly shift and release energy","collide slowly over months","rotate in place"],"a":1},{"n":2,"q":"Seismographs are used to:","o":["predict earthquakes","detect and record earthquake vibrations","measure temperature changes","study ocean waves"],"a":1},{"n":3,"q":"P-waves are called \"primary\" because they:","o":["are the largest waves","arrive first at monitoring stations","cause the most damage","are the slowest"],"a":1},{"n":4,"q":"S-waves are often more damaging than P-waves because:","o":["they arrive first","they travel faster","they cause side-to-side motion","they compress the ground"],"a":2},{"n":5,"q":"The Richter scale was eventually supplemented by the moment magnitude scale because:","o":["it was too complicated","it had limitations for very large earthquakes","scientists preferred different numbers","it could not measure small earthquakes"],"a":1},{"n":6,"q":"Earthquakes can trigger:","o":["rain and snow only","tsunamis, landslides, and fires","changes to seasons","shifts in star positions"],"a":1},{"n":7,"q":"Early warning systems provide earthquake alerts by:","o":["predicting earthquakes weeks in advance","detecting earthquakes within seconds","monitoring weather patterns","measuring plate movement"],"a":1},{"n":8,"q":"The passage suggests that predicting earthquakes is:","o":["easily accomplished","currently impossible with certainty","a recent scientific achievement","less important than other research"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["describe earthquake damage","explain how earthquakes are measured and detected","promote building safety codes","compare different seismic scales"],"a":1},{"n":10,"q":"Warning time from early warning systems is valuable because:","o":["it allows evacuation over hours","it provides seconds to take shelter","it predicts earthquake magnitude","it stops earthquakes from occurring"],"a":1}]}],"poetry":[{"title":"The Mountain's Call","tag":"New","poem":{"title":"The Mountain's Call","author":"by Emma Lin","lines":["Above the clouds, the summit waits,","Its silence vast as frozen gates.","No traveller holds what summits keep,","Yet those who climb know secrets deep.","","A granite strength through seasons' call,","It stands untouched by time's slow fall.","The echo fades, both far and near,","Holds whispers only hearts can hear."]},"glossary":[{"term":"Summit","def":"The highest point of a mountain"},{"term":"Granite","def":"A hard grey rock that forms mountains"},{"term":"Echo","def":"A sound that repeats after bouncing off surfaces"}],"questions":[{"n":1,"q":"The overall mood of the poem is:","o":["anxious and fearful","majestic and contemplative","cheerful and humorous","angry and defiant"],"a":1},{"n":2,"q":"The \"summit\" in the poem most likely represents:","o":["an easy destination","a source of danger","a place of mystery and aspiration","an ordinary hilltop"],"a":2},{"n":3,"q":"\"No traveller holds what summits keep\" suggests that:","o":["travellers are forbidden from climbing","the mountain's deeper meaning cannot be possessed","climbing equipment is unavailable","the summit is not real"],"a":1},{"n":4,"q":"According to the Glossary, \"granite\" refers to:","o":["a type of ice","a hard grey rock","a mountain path","a kind of cloud"],"a":1},{"n":5,"q":"\"A granite strength\" implies the mountain is:","o":["fragile and crumbling","warm and welcoming","enduring and powerful","small and hidden"],"a":2},{"n":6,"q":"The tone of the poem is best described as:","o":["playful","reflective","urgent","sarcastic"],"a":1},{"n":7,"q":"The echo is described as being:","o":["loud and constant","both far and near","sharp and clear","slow and heavy"],"a":1},{"n":8,"q":"The phrase \"whispers only hearts can hear\" suggests the mountain's secrets are:","o":["broadcast widely","easily written down","deeply personal","forgotten over time"],"a":2},{"n":9,"q":"The main purpose of the poem is to:","o":["teach climbing techniques","describe granite formations","evoke a sense of wonder about mountains","explain how echoes work"],"a":2},{"n":10,"q":"The glossary is included to:","o":["summarise the poem's story","clarify key vocabulary","critique the poet's style","provide historical context"],"a":1}]},{"title":"The River's Journey","tag":"New","poem":{"title":"The River's Journey","author":"by Sam Whitfield","lines":["From mountain springs, the river flows,","Through meadow banks where clover grows.","It carves a path through ancient stone,","A traveller that walks alone.","","By willows bent with silver leaves,","It hums a song the forest weaves.","Until at last it meets the sea,","And finds the place it longed to be."]},"glossary":[{"term":"Meadow","def":"A field of grass and wildflowers"},{"term":"Carves","def":"Cuts or shapes through something gradually"},{"term":"Willows","def":"Trees with long, drooping branches found near water"}],"questions":[{"n":1,"q":"The river's journey begins at:","o":["the meadow","mountain springs","the forest","the sea"],"a":1},{"n":2,"q":"The river is described as \"a traveller that walks alone\" to suggest it:","o":["needs help","is independent and solitary","is lost","travels with fish"],"a":1},{"n":3,"q":"The river \"carves a path through ancient stone\", which means it:","o":["breaks the stone violently","gradually shapes the landscape","swims around rocks","floats above the stone"],"a":1},{"n":4,"q":"Willows grow near the river because they:","o":["prefer dry land","are attracted to water","grow only in forests","cannot survive elsewhere"],"a":1},{"n" function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateHumanitiesTest() {
  const fiction = pickRandom(HUMANITIES_BANK.fiction);
  const biography = pickRandom(HUMANITIES_BANK.biography);
  const science = pickRandom(HUMANITIES_BANK.science);
  const poetry = pickRandom(HUMANITIES_BANK.poetry);
  const passages = [fiction, biography, science, poetry];
  let qNum = 1;
  return passages.map((p, pi) => {
    const renumbered = p.questions.map((q, qi) => ({ ...q, n: qNum + qi }));
    qNum += p.questions.length;
    return { ...p, questions: renumbered, passageIndex: pi + 1 };
  });
}

function generateMathsTest() {
  return MATHS_BANK.map(type => {
    const variant = pickRandom(type.variants);
    return { type: type.type, title: type.title, ...variant };
  });
}

// TIMER HOOK
// ═══════════════════════════════════════════════════════════════════════

function useTimer(initialSeconds, onTimeUp) {
  const [seconds, setSeconds] = useState(initialSeconds);
  const [running, setRunning] = useState(false);
  const cbRef = useRef(onTimeUp);
  cbRef.current = onTimeUp;
  useEffect(() => {
    if (!running || seconds <= 0) return;
    const id = setInterval(() => {
      setSeconds(s => {
        if (s <= 1) { clearInterval(id); setRunning(false); cbRef.current?.(); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running, seconds]);
  const start = useCallback(() => setRunning(true), []);
  const stop = useCallback(() => setRunning(false), []);
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  const display = mins + ":" + secs.toString().padStart(2, "0");
  const urgent = seconds < 120 && seconds > 0;
  return { seconds, display, running, start, stop, urgent };
}

function MCQQuestion({ qData, index, selected, onSelect, showResult }) {
  const correct = qData.a;
  const isCorrect = selected === correct;
  return (
    <div style={{ marginBottom:16, padding:"12px 16px", backgroundColor: showResult ? (isCorrect ? "#f0fdf4" : selected !== undefined ? "#fef2f2" : "#f8fafc") : "#f8fafc", borderRadius:8, border: "1px solid " + (showResult ? (isCorrect ? "#86efac" : selected !== undefined ? "#fca5a5" : "#e2e8f0") : "#e2e8f0") }}>
      <div style={{ fontWeight:600, fontSize:14, marginBottom:8 }}>{qData.n}. {qData.q}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {qData.o.map((opt, oi) => {
          const isSel = selected === oi;
          const isCor = oi === correct;
          let bg = "#fff", bdr = "#d1d5db", fw = 400;
          if (showResult) {
            if (isCor) { bg = "#dcfce7"; bdr = "#22c55e"; fw = 600; }
            else if (isSel && !isCor) { bg = "#fee2e2"; bdr = "#ef4444"; }
          } else if (isSel) { bg = "#dbeafe"; bdr = "#3b82f6"; fw = 600; }
          return (
            <label key={oi} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:6, backgroundColor:bg, border:"1px solid "+bdr, cursor:showResult?"default":"pointer", fontWeight:fw, fontSize:14 }} onClick={() => !showResult && onSelect(index, oi)}>
              <span style={{ width:22, height:22, borderRadius:"50%", border:"2px solid "+(isSel?"#3b82f6":"#9ca3af"), backgroundColor:isSel?"#3b82f6":"#fff", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:12, fontWeight:700, flexShrink:0 }}>{LETTERS[oi]}</span>
              {opt}
              {showResult && isCor && <span style={{ marginLeft:"auto", color:"#16a34a", fontSize:16 }}>✓</span>}
              {showResult && isSel && !isCor && <span style={{ marginLeft:"auto", color:"#dc2626", fontSize:16 }}>✗</span>}
            </label>
          );
        })}
      </div>
    </div>
  );
}

      <span style={{ fontSize:28, fontWeight:700, fontFamily:"monospace", color:timer.urgent?"#dc2626":"#0f172a" }}>{timer.display}</span>
      <span style={{ fontSize:14, color:"#64748b" }}>{answered} / {total} answered</span>
      {!submitted && <button onClick={onSubmit} style={{ ...btnBase, backgroundColor:"#16a34a", color:"#fff" }}>Submit Test</button>}
    </div>
  );
}

function ScoreBanner({ score, total }) {
  const pct = score / total;
  const bg = pct >= 0.7 ? "#f0fdf4" : pct >= 0.5 ? "#fefce8" : "#fef2f2";
  const bdr = pct >= 0.7 ? "#22c55e" : pct >= 0.5 ? "#eab308" : "#ef4444";
  return (
    <div style={{ backgroundColor:bg, border:"2px solid "+bdr, borderRadius:12, padding:20, marginBottom:20, textAlign:"center" }}>
      <div style={{ fontSize:36, fontWeight:800 }}>{score} / {total}</div>
      <div style={{ fontSize:16, color:"#475569" }}>{Math.round(pct * 100)}% correct</div>
      <div style={{ fontSize:14, marginTop:8, color:"#64748b" }}>Scroll down to review your answers</div>
    </div>
  );
}

function HumanitiesSection({ onBack, onScore }) {
  const [passages] = useState(() => generateHumanitiesTest());

  const handleSelect = (qi, oi) => { if (!submitted) setAnswers(prev => ({ ...prev, [qi]: oi })); };

    timer.stop();
    let c = 0;
    allQs.forEach((q, i) => { if (answers[i] === q.a) c++; });
    setScore(c);
    setSubmitted(true);

function StatsCard({ scores, color }) {
  if (!scores || scores.length === 0) return (
    <div style={{ fontSize:12, color:"#94a3b8", fontStyle:"italic", marginTop:4 }}>No tests taken yet</div>
  );
  const pcts = scores.map(s => Math.round((s.score / s.total) * 100));
  const avg = Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length);
  const best = Math.max(...pcts);
  const worst = Math.min(...pcts);
  return (
    <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:color+"11", color:color, fontWeight:600 }}>Tests: {scores.length}</span>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:"#f0f9ff", color:"#0369a1", fontWeight:600 }}>Avg: {avg}%</span>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:"#f0fdf4", color:"#15803d", fontWeight:600 }}>Best: {best}%</span>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:"#fef2f2", color:"#b91c1c", fontWeight:600 }}>Worst: {worst}%</span>
    </div>
  );
}

function ProfileManager({ profiles, currentUser, onSelect, onCreate, onDelete }) {
  const [newName, setNewName] = useState("");
  const [showForm, setShowForm] = useState(false);
  const handleCreate = () => {
    const trimmed = newName.trim();
    if (trimmed && !profiles.find(p => p.name === trimmed)) {
      onCreate(trimmed);
      setNewName("");
      setShowForm(false);
    }
  };
  return (
    <div style={{ marginBottom:24, padding:16, backgroundColor:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:profiles.length > 0 ? 12 : 0 }}>
        <div style={{ fontWeight:700, fontSize:14, color:"#334155" }}>👤 User Profiles</div>
        {!showForm && <button onClick={() => setShowForm(true)} style={{ ...btnBase, fontSize:12, padding:"4px 12px", backgroundColor:"#2563eb", color:"#fff" }}>+ New Profile</button>}
      </div>
      {showForm && (
        <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center" }}>
          <input value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleCreate()} placeholder="Enter name..." style={{ flex:1, padding:"6px 12px", borderRadius:8, border:"1px solid #cbd5e1", fontSize:14, outline:"none" }} autoFocus />
          <button onClick={handleCreate} style={{ ...btnBase, fontSize:12, padding:"6px 14px", backgroundColor:"#16a34a", color:"#fff" }}>Add</button>
          <button onClick={() => { setShowForm(false); setNewName(""); }} style={{ ...btnBase, fontSize:12, padding:"6px 14px", backgroundColor:"#f1f5f9", color:"#64748b" }}>Cancel</button>
        </div>
      )}
      {profiles.length === 0 && !showForm && (
        <div style={{ fontSize:13, color:"#94a3b8", textAlign:"center", padding:"8px 0" }}>No profiles yet. Create one to start tracking results!</div>
      )}
      {profiles.length > 0 && (
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {profiles.map(p => (
            <div key={p.name} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <button onClick={() => onSelect(p.name)} style={{ ...btnBase, fontSize:13, padding:"6px 16px", backgroundColor:currentUser === p.name ? "#2563eb" : "#fff", color:currentUser === p.name ? "#fff" : "#334155", border:currentUser === p.name ? "2px solid #2563eb" : "1px solid #cbd5e1", fontWeight:currentUser === p.name ? 700 : 400 }}>{p.name}</button>
              <button onClick={() => onDelete(p.name)} style={{ border:"none", background:"none", cursor:"pointer", fontSize:14, color:"#94a3b8", padding:"2px 4px", lineHeight:1 }} title={"Remove " + p.name}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// MAIN APP

// Storage helpers for persistence
const STORAGE_KEY = "acer_practice_profiles";
const STORAGE_USER_KEY = "acer_practice_current_user";

function loadProfiles() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed)) return parsed; }
  } catch(e) {}
  return [];
}

function saveProfiles(profiles) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); } catch(e) {}
}

function loadCurrentUser() {
  try { return localStorage.getItem(STORAGE_USER_KEY) || null; } catch(e) { return null; }
}

function saveCurrentUser(name) {
  try {
    if (name) localStorage.setItem(STORAGE_USER_KEY, name);
    else localStorage.removeItem(STORAGE_USER_KEY);
  } catch(e) {}
}

function App() {
  const [view, setView] = useState("menu");
  const [key, setKey] = useState(0);
  const [profiles, setProfiles] = useState(() => loadProfiles());
  const [currentUser, setCurrentUser] = useState(() => loadCurrentUser());

  // Persist profiles whenever they change
  useEffect(() => { saveProfiles(profiles); }, [profiles]);
  useEffect(() => { saveCurrentUser(currentUser); }, [currentUser]);

  const startSection = (v) => { setKey(k => k + 1); setView(v); };
  const backToMenu = () => setView("menu");

  const createProfile = (name) => {
    setProfiles(prev => [...prev, { name, humanities: [], maths: [] }]);
    setCurrentUser(name);
  };
  const selectProfile = (name) => setCurrentUser(name);
  const deleteProfile = (name) => {
    setProfiles(prev => prev.filter(p => p.name !== name));
    if (currentUser === name) setCurrentUser(null);
  };

  const recordScore = (section, score, total) => {
    if (!currentUser) return;
    setProfiles(prev => prev.map(p => {
      if (p.name !== currentUser) return p;
      return { ...p, [section]: [...p[section], { score, total, date: Date.now() }] };
    }));
  };

  const currentProfile = profiles.find(p => p.name === currentUser);

  if (view === "we1") return <WritingSection key={key} title="Section 1: Written Expression" time={25*60} promptBank={WE1_PROMPTS} onBack={backToMenu} />;
  if (view === "humanities") return <HumanitiesSection key={key} onBack={backToMenu} onScore={(s, t) => recordScore("humanities", s, t)} />;
  if (view === "maths") return <MathsSection key={key} onBack={backToMenu} onScore={(s, t) => recordScore("maths", s, t)} />;
  if (view === "we4") return <WritingSection key={key} title="Section 4: Written Expression" time={25*60} promptBank={WE4_PROMPTS} onBack={backToMenu} />;

  const cards = [
    { id:"we1", title:"Section 1: Written Expression", desc:"Persuasive essay — random prompt from bank of 25", time:"25 min", icon:"✍️", color:"#8b5cf6", stats:null },
    { id:"humanities", title:"Section 2: Humanities", desc:"40 questions — 4 random passages (fiction, biography, science, poetry)", time:"40 min", icon:"📖", color:"#3b82f6", stats:currentProfile ? currentProfile.humanities : null },
    { id:"maths", title:"Section 3: Mathematics", desc:"32 questions — 16 types, each randomly selected", time:"40 min", icon:"🔢", color:"#059669", stats:currentProfile ? currentProfile.maths : null },
    { id:"we4", title:"Section 4: Written Expression", desc:"Creative writing — random prompt from bank of 25", time:"25 min", icon:"✨", color:"#d97706", stats:null },
  ];

  return (
    <div style={{ maxWidth:680, margin:"0 auto", padding:"16px 0" }}>
      <div style={{ textAlign:"center", marginBottom:24 }}>
        <h1 style={{ fontSize:26, fontWeight:800, color:"#0f172a", marginBottom:4 }}>ACER Scholarship Practice Test</h1>
        <p style={{ fontSize:15, color:"#64748b", marginBottom:4 }}>Randomised Practice Tests — For Lili</p>
        <p style={{ fontSize:12, color:"#94a3b8" }}>Each attempt generates a new test from the question bank</p>
        <div style={{ display:"flex", justifyContent:"center", gap:12, marginTop:12, flexWrap:"wrap" }}>
          {Object.entries(TAG_COLORS).map(([tag, c]) => (
            <span key={tag} style={{ fontSize:12, padding:"2px 10px", borderRadius:12, backgroundColor:c.bg, color:c.text, border:"1px solid "+c.border }}>{tag}</span>
          ))}
        </div>
      </div>
      <ProfileManager profiles={profiles} currentUser={currentUser} onSelect={selectProfile} onCreate={createProfile} onDelete={deleteProfile} />
      {currentUser && (
        <div style={{ marginBottom:16, padding:"8px 16px", backgroundColor:"#eff6ff", borderRadius:8, border:"1px solid #bfdbfe", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:14, color:"#1e40af" }}>🎯 Tracking results for <strong>{currentUser}</strong></span>
        </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {cards.map(s => (
          <button key={s.id} onClick={() => startSection(s.id)} style={{ display:"flex", alignItems:"center", gap:16, padding:"18px 20px", border:"1px solid #e2e8f0", borderRadius:12, backgroundColor:"#fff", cursor:"pointer", textAlign:"left", transition:"all 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = s.color; e.currentTarget.style.boxShadow = "0 2px 8px " + s.color + "22"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "#e2e8f0"; e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.06)"; }}>
            <span style={{ fontSize:32 }}>{s.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:700, fontSize:16, color:"#0f172a" }}>{s.title}</div>
              <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>{s.desc}</div>
              {s.stats !== null && currentUser && <StatsCard scores={s.stats} color={s.color} />}
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
              <span style={{ fontSize:13, fontWeight:600, color:s.color, backgroundColor:s.color+"11", padding:"2px 10px", borderRadius:8 }}>{s.time}</span>
              <span style={{ fontSize:20, color:"#94a3b8" }}>→</span>
            </div>
          </button>
        ))}
      </div>
