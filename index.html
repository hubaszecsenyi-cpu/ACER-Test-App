nYour skin is your first line of defense against infection. It acts as a barrier, keeping pathogens out. If you get a cut, your skin repairs itself. Your stomach acid kills many bacteria you swallow. Tears and saliva also contain antibodies that fight germs.\n\nYou can help your immune system stay strong by eating healthy food, exercising regularly, getting enough sleep, and washing your hands. Vaccines also help by teaching your immune system to recognize dangerous diseases without getting sick. Your immune system works 24 hours a day to keep you healthy.","questions":[{"n":1,"q":"What is the main job of the immune system?","o":["To make you tired","To protect your body from harmful invaders","To help you digest food","To control your emotions"],"a":1},{"n":2,"q":"What are white blood cells compared to in the passage?","o":["Messengers","Soldiers","Athletes","Teachers"],"a":1},{"n":3,"q":"What do phagocytes do?","o":["Store energy","Surround and destroy harmful invaders by eating them","Create antibodies","Filter blood"],"a":1},{"n":4,"q":"Which cells make antibodies?","o":["Phagocytes","T cells","B cells","Skin cells"],"a":2},{"n":5,"q":"Why can't you usually get the same illness twice?","o":["The second infection is always weaker","B cells remember the pathogen and can fight it quickly","Your skin prevents all infections","White blood cells disappear after one infection"],"a":1},{"n":6,"q":"What is the first line of defense against infection?","o":["White blood cells","Your skin","Antibodies","Your lungs"],"a":1},{"n":7,"q":"What does the word 'pathogens' mean in this passage?","o":["Helpful bacteria in your gut","Harmful invaders like bacteria and viruses","Proteins that fight disease","Parts of your skin"],"a":1},{"n":8,"q":"How do vaccines help your immune system?","o":["They provide instant protection","They teach your immune system to recognize dangerous diseases without getting sick","They replace white blood cells","They eliminate all germs in your body"],"a":1},{"n":9,"q":"Which statement is supported by the passage?","o":["Your immune system only works while you sleep","Your immune system needs help from healthy habits","Your immune system can stop working at any time","Antibodies are harmful to the body"],"a":1},{"n":10,"q":"What is the main idea of the passage?","o":["Different parts of your body are unrelated","Your immune system is complex but essential for protecting your health","White blood cells are the only defense against disease","The immune system works better without vaccines"],"a":1}]},{"title":"How Bees Communicate","tag":"New","text":"Honeybees are incredible insects that live and work together in large colonies. One of the most amazing things about bees is how they communicate with each other. Unlike humans who use words, bees use special movements and chemical signals to share information.\n\nThe most famous bee communication method is called the waggle dance. When a forager bee finds a good source of flowers with nectar or pollen, it returns to the hive and performs a special dance. The bee moves in a figure-eight pattern while waggling its body. This dance tells other bees exactly where the flowers are located. The direction of the waggle dance points toward the sun and indicates the direction to the food. The longer and faster the waggle, the closer the flowers are.\n\nBees also use sounds to communicate. They make buzzing sounds by vibrating their wings. Different buzzes have different meanings. A long buzz might mean \"Watch out!\" while other buzzes signal different messages. These sounds help coordinate activity in the hive.\n\nChemical signals are another important way bees communicate. Bees release special chemicals called pheromones. These scents carry messages between bees. For example, when a bee finds food, it leaves a pheromone trail that other bees can follow. The queen bee produces a special pheromone that tells worker bees she is healthy and present in the hive. If this pheromone disappears, worker bees know something is wrong.\n\nThis communication system is so effective that bees can work together to find food, build honeycombs, care for babies, and defend the hive. Scientists continue to study bee communication to better understand these fascinating insects. By protecting bees and their habitats, we protect an important part of our environment.","questions":[{"n":1,"q":"What is the waggle dance?","o":["A way bees exercise","A special movement that tells other bees where flowers are located","A dance bees do for fun","A signal for danger"],"a":1},{"n":2,"q":"What does the direction of the waggle dance indicate?","o":["The distance to flowers","The type of flowers available","The direction toward the sun and the food location","The time of day"],"a":2},{"n":3,"q":"How do bees make sounds to communicate?","o":["By hitting their antennae together","By snapping their legs","By vibrating their wings to create buzzes","By rubbing their bodies together"],"a":2},{"n":4,"q":"What are pheromones?","o":["A type of flower","Special chemicals released by bees that carry messages","Sounds made by bees","Movements in the waggle dance"],"a":1},{"n":5,"q":"Why is the queen bee's pheromone important?","o":["It makes other bees work faster","It helps bees find flowers","It tells worker bees the queen is healthy and present in the hive","It prevents all diseases"],"a":2},{"n":6,"q":"Based on the passage, what would happen if the queen bee's pheromone disappeared?","o":["Bees would start the waggle dance","Worker bees would know something is wrong","All bees would leave the hive","The hive would produce more honey"],"a":1},{"n":7,"q":"How do other bees follow a bee that found food?","o":["They watch the waggle dance","They follow the bee back to the flowers","They follow a pheromone trail","They wait for the bee to return"],"a":2},{"n":8,"q":"What does the passage suggest about bee communication?","o":["It is simple and not very effective","It is only used for finding food","It is complex and allows bees to work together for many purposes","It is similar to human language"],"a":2},{"n":9,"q":"What is the main idea of the passage?","o":["Bees are just like other insects","Bees use multiple methods of communication to work together effectively","Waggle dancing is the only way bees communicate","Humans should try to learn the waggle dance"],"a":1},{"n":10,"q":"Why do scientists continue to study bee communication?","o":["To teach bees new dances","To better understand these fascinating insects and protect them","To make bees produce more honey","To prevent bees from leaving their hives"],"a":1}]},{"title":"Photosynthesis: How Plants Make Food","tag":"New","text":"Plants are amazing living things that can make their own food using sunlight. This process is called photosynthesis. Without photosynthesis, there would be no plants, and without plants, most animals couldn't survive. Photosynthesis is one of the most important processes on Earth.\n\nPhotosynthesis happens mainly in the leaves of plants. Leaves contain a green pigment called chlorophyll, which gives plants their green color. Chlorophyll is essential because it captures light energy from the sun. The plant uses this light energy to power the food-making process.\n\nTo make food, plants need three main ingredients: sunlight, water, and carbon dioxide. Water is absorbed through the plant's roots from the soil. Carbon dioxide is a gas found in the air that enters the plant through tiny holes in the leaves called stomata. Stomata open and close to control when gases enter and leave the plant. When the plant combines these ingredients using light energy, it produces glucose, which is a type of sugar that the plant uses as food.\n\nPhotosynthesis also produces oxygen as a byproduct. Oxygen is released through the stomata back into the air. This is the oxygen that animals breathe. In fact, most of the oxygen in our atmosphere comes from photosynthesis in plants and algae.\n\nDifferent plants photosynthesize at different rates. Plants that grow in sunny areas, like sunflowers and tomato plants, need lots of light and photosynthesize quickly. Some plants, like ferns and shade-loving hostas, can photosynthesize with less light. This is why different plants thrive in different environments. Understanding photosynthesis helps scientists grow more food and create better habitats for plants and animals.","questions":[{"n":1,"q":"What is photosynthesis?","o":["The process of plants drinking water","The process by which plants make their own food using sunlight","The way plants move water from roots to leaves","The method plants use to spread seeds"],"a":1},{"n":2,"q":"What is chlorophyll?","o":["A nutrient in soil","A green pigment in leaves that captures light energy","A type of water in plants","A gas in the air"],"a":1},{"n":3,"q":"What are the three main ingredients plants need for photosynthesis?","o":["Soil, rocks, and sand","Sunlight, water, and carbon dioxide","Roots, stems, and leaves","Glucose, oxygen, and nitrogen"],"a":1},{"n":4,"q":"Where do plants absorb water?","o":["Through their leaves","Through tiny holes called stomata","Through their roots from the soil","Through their flowers"],"a":2},{"n":5,"q":"What are stomata?","o":["Green parts of leaves","Tiny holes in leaves that control gas exchange","Parts of plant roots","Seeds of plants"],"a":1},{"n":6,"q":"What does photosynthesis produce besides glucose?","o":["Carbon dioxide","Water","Oxygen","Chlorophyll"],"a":2},{"n":7,"q":"Why can animals depend on photosynthesis?","o":["Plants provide shelter","Plants produce the oxygen that animals breathe","Plants control the weather","Plants clean the soil"],"a":1},{"n":8,"q":"Why do sunflowers photosynthesize quickly?","o":["They are taller than other plants","They grow in sunny areas and need lots of light","They have more leaves than ferns","They are stronger than other plants"],"a":1},{"n":9,"q":"Based on the passage, what would happen if photosynthesis stopped?","o":["Only animals would be affected","Plants would still survive","There would be no oxygen, and most life couldn't survive","The sun would disappear"],"a":2},{"n":10,"q":"What is the main idea of the passage?","o":["All plants look green","Photosynthesis is a complex process with no real importance","Photosynthesis is an essential process that allows plants to make food and produce oxygen","Only big plants can photosynthesize"],"a":2}]}],"poetry":[{"title":"The Mountain's Call","tag":"New","poem":{"title":"The Mountain's Call","author":"by Emma Lin","lines":["Above the clouds, the summit waits,","Its silence vast as frozen gates.","No traveller holds what summits keep,","Yet those who climb know secrets deep.","","A granite strength through seasons' call,","It stands untouched by time's slow fall.","The echo fades, both far and near,","Holds whispers only hearts can hear."]},"glossary":[{"term":"Summit","def":"The highest point of a mountain"},{"term":"Granite","def":"A hard grey rock that forms mountains"},{"term":"Echo","def":"A sound that repeats after bouncing off surfaces"}],"questions":[{"n":1,"q":"The overall mood of the poem is:","o":["anxious and fearful","majestic and contemplative","cheerful and humorous","angry and defiant"],"a":1},{"n":2,"q":"The \"summit\" in the poem most likely represents:","o":["an easy destination","a source of danger","a place of mystery and aspiration","an ordinary hilltop"],"a":2},{"n":3,"q":"\"No traveller holds what summits keep\" suggests that:","o":["travellers are forbidden from climbing","the mountain's deeper meaning cannot be possessed","climbing equipment is unavailable","the summit is not real"],"a":1},{"n":4,"q":"According to the Glossary, \"granite\" refers to:","o":["a type of ice","a hard grey rock","a mountain path","a kind of cloud"],"a":1},{"n":5,"q":"\"A granite strength\" implies the mountain is:","o":["fragile and crumbling","warm and welcoming","enduring and powerful","small and hidden"],"a":2},{"n":6,"q":"The tone of the poem is best described as:","o":["playful","reflective","urgent","sarcastic"],"a":1},{"n":7,"q":"The echo is described as being:","o":["loud and constant","both far and near","sharp and clear","slow and heavy"],"a":1},{"n":8,"q":"The phrase \"whispers only hearts can hear\" suggests the mountain's secrets are:","o":["broadcast widely","easily written down","deeply personal","forgotten over time"],"a":2},{"n":9,"q":"The main purpose of the poem is to:","o":["teach climbing techniques","describe granite formations","evoke a sense of wonder about mountains","explain how echoes work"],"a":2},{"n":10,"q":"The glossary is included to:","o":["summarise the poem's story","clarify key vocabulary","critique the poet's style","provide historical context"],"a":1}]},{"title":"The River's Journey","tag":"New","poem":{"title":"The River's Journey","author":"by Sam Whitfield","lines":["From mountain springs, the river flows,","Through meadow banks where clover grows.","It carves a path through ancient stone,","A traveller that walks alone.","","By willows bent with silver leaves,","It hums a song the forest weaves.","Until at last it meets the sea,","And finds the place it longed to be."]},"glossary":[{"term":"Meadow","def":"A field of grass and wildflowers"},{"term":"Carves","def":"Cuts or shapes through something gradually"},{"term":"Willows","def":"Trees with long, drooping branches found near water"}],"questions":[{"n":1,"q":"The river's journey begins at:","o":["the meadow","mountain springs","the forest","the sea"],"a":1},{"n":2,"q":"The river is described as \"a traveller that walks alone\" to suggest it:","o":["needs help","is independent and solitary","is lost","travels with fish"],"a":1},{"n":3,"q":"The river \"carves a path through ancient stone\", which means it:","o":["breaks the stone violently","gradually shapes the landscape","swims around rocks","floats above the stone"],"a":1},{"n":4,"q":"Willows grow near the river because they:","o":["prefer dry land","are attracted to water","grow only in forests","cannot survive elsewhere"],"a":1},{"n":5,"q":"\"It hums a song the forest weaves\" is an example of:","o":["personification","a literal description","a scientific fact","a historical event"],"a":0},{"n":6,"q":"The tone of the poem suggests the river's journey is:","o":["accidental and unplanned","purposeful and destined","confusing and difficult","unwanted and forced"],"a":1},{"n":7,"q":"The river \"finds the place it longed to be\" when it:","o":["reaches the meadow","passes the willows","meets the sea","starts at the springs"],"a":2},{"n":8,"q":"The poem uses natural imagery primarily to:","o":["teach geography","create a sense of movement and purpose","describe waterfalls","explain weather patterns"],"a":1},{"n":9,"q":"This poem is mainly about:","o":["water pollution","the path of a river from source to sea","different types of plants","human settlements"],"a":1},{"n":10,"q":"The journey described in the poem suggests that:","o":["rivers are dangerous","natural processes have purpose and direction","meadows block rivers","stone is stronger than water"],"a":1}]},{"title":"The Night Garden","tag":"New","poem":{"title":"The Night Garden","author":"by Priya Sharma","lines":["When moonlight spills on petals white,","The garden wakes in silver light.","Each shadow holds a whispered name,","No two nights ever look the same.","","The owl keeps watch from cedar tall,","While crickets play their evening call.","The dew will come before the dawn,","And by first light the spell is gone."]},"glossary":[{"term":"Cedar","def":"A type of tall evergreen tree with fragrant wood"},{"term":"Dew","def":"Tiny drops of water that form on plants in early morning"},{"term":"Spell","def":"A magical influence or enchantment"}],"questions":[{"n":1,"q":"The garden \"wakes in silver light\" refers to:","o":["electric lights","moonlight","sunrise","fire"],"a":1},{"n":2,"q":"The poem suggests the garden is different each night because:","o":["it moves","shadows and light create new patterns","flowers bloom and fade daily","animals rearrange it"],"a":1},{"n":3,"q":"\"Each shadow holds a whispered name\" suggests:","o":["there are ghosts in the garden","the darkness reveals secret meanings","names are written in shadows","shadows talk to each other"],"a":1},{"n":4,"q":"The owl is described as keeping watch, which means it:","o":["guards or protects the garden","sleeps in the cedar","sings beautifully","brings the dew"],"a":0},{"n":5,"q":"The crickets \"play their evening call\", which personifies them as:","o":["musicians","soldiers","dancers","builders"],"a":0},{"n":6,"q":"Dew arrives before dawn, suggesting:","o":["it comes during day","it arrives in the early morning hours","it falls all night long","it appears in afternoon"],"a":1},{"n":7,"q":"\"The spell is gone\" when the sun rises, meaning the magic of night:","o":["returns","disappears","intensifies","remains forever"],"a":1},{"n":8,"q":"The poem's structure shows that the garden's enchantment is:","o":["permanent","temporary and cyclical","completely imaginary","caused by the owl"],"a":1},{"n":9,"q":"The main theme of this poem is:","o":["gardens are dangerous places","nighttime nature has its own magic and beauty","dew destroys flowers","owls are evil creatures"],"a":1},{"n":10,"q":"The glossary defines \"spell\" as a magical influence to help readers understand that the night garden is:","o":["scientifically impossible","purely factual","portrayed as an enchanted place","a real location"],"a":2}]},{"title":"Ocean and Sea Adventure","tag":"New","poem":{"title":"The Coral Kingdom","author":"Maya Richardson","lines":["Beneath the waves where sunlight dances bright,","The coral kingdom glows with colours rare,","Red branches reach like fingers in the night,","While silver fish swim swiftly through the air.","","The anemones sway gently, side to side,","Like tiny dancers dressed in purple gowns,","A thousand creatures here in peace reside,","In cities built of stone and sea-grass crowns.","","The ocean whispers secrets to the shore,","Of treasures hidden in the sandy deep,","Where turtles glide through gardens to explore,","And pearl-white shells their precious beauty keep.","","Oh coral kingdom, jewelled and alive,","Where wonders dance and mysteries survive."]},"questions":[{"n":1,"q":"What colour is the coral described as in the first stanza?","o":["Blue and white","Red and bright","Purple and gold","Green and silver"],"a":1},{"n":2,"q":"Which literary device is used in the line 'Red branches reach like fingers in the night'?","o":["Metaphor","Simile","Alliteration","Personification"],"a":1},{"n":3,"q":"In the second stanza, what does 'sway gently, side to side' suggest the anemones are doing?","o":["Growing larger","Changing colour","Moving like dancers","Hiding from fish"],"a":2},{"n":4,"q":"What is the best meaning of 'reside' in the line 'A thousand creatures here in peace reside'?","o":["Visit temporarily","Sleep peacefully","Live or dwell","Hide secretly"],"a":2},{"n":5,"q":"The anemones are compared to 'tiny dancers dressed in purple gowns'. This is an example of:","o":["Personification only","Simile only","Both personification and simile","Neither"],"a":2},{"n":6,"q":"What does the ocean 'whisper' in the third stanza, and why is this word choice significant?","o":["It whispers about danger; shows fear","It whispers secrets; suggests mystery","It whispers warnings; shows care","It whispers directions; helps navigation"],"a":1},{"n":7,"q":"Which line contains alliteration (repetition of initial consonant sounds)?","o":["The coral kingdom glows with colours rare","Where wonders dance and mysteries survive","Like tiny dancers dressed in purple gowns","The anemones sway gently, side to side"],"a":1},{"n":8,"q":"Based on the poem, what is the overall mood or feeling created?","o":["Scary and dangerous","Magical and peaceful","Sad and lonely","Angry and stormy"],"a":1},{"n":9,"q":"What can be inferred about why the poet calls the coral a 'kingdom'?","o":["It has a king ruling it","It is organized with different creatures like a city","It is under human control","It is the largest place underwater"],"a":1},{"n":10,"q":"The final two lines suggest the coral kingdom is:","o":["Dying slowly","Full of life and wonder worth protecting","Too deep for humans to see","Dangerous to explore"],"a":1}]},{"title":"Seasonal Change and Transformation","tag":"New","poem":{"title":"Autumn's Golden Goodbye","author":"James Chen","lines":["The leaves release their grip and slip away,","Like golden coins that tumble, twist, and fall,","The trees stand bare and shiver in the grey,","And nature whispers autumn's final call.","","The wind comes dancing through the fading trees,","It spins the crimson carpets round and round,","While all the creatures scurry on the breeze,","To gather food before the frozen ground.","","The harvest moon hangs heavy, round, and bright,","It casts a silver path across the night,","The world is dressed in orange, rust, and red,","As seasons shift to winter cold ahead.","","Yet still there's beauty in this slow goodbye,","In change that teaches how all things must die."]},"questions":[{"n":1,"q":"What do the falling leaves compare to in the first stanza?","o":["Water droplets","Golden coins","Feathers","Butterflies"],"a":1},{"n":2,"q":"The line 'The wind comes dancing through the fading trees' uses which literary device?","o":["Metaphor","Simile","Personification","Alliteration"],"a":2},{"n":3,"q":"What word best describes the mood of the first stanza?","o":["Joyful and exciting","Melancholic and fading","Angry and violent","Peaceful and still"],"a":1},{"n":4,"q":"What does 'scurry' most likely mean in the second stanza?","o":["Walk slowly","Move quickly and hurriedly","Dance gracefully","Hide underground"],"a":1},{"n":5,"q":"The 'crimson carpets' are:","o":["Real carpets on the ground","A metaphor for autumn leaves","The forest floor","Red flowers"],"a":1},{"n":6,"q":"Which line from the poem contains alliteration?","o":["The trees stand bare and shiver in the grey","The harvest moon hangs heavy, round, and bright","To gather food before the frozen ground","While all the creatures scurry on the breeze"],"a":1},{"n":7,"q":"What is the 'silver path' created by the harvest moon likely representing?","o":["A road to follow","Moonlight reflecting on something","A path through the forest","An actual silver trail"],"a":1},{"n":8,"q":"The poem describes the world being 'dressed in orange, rust, and red'. What does this personification suggest?","o":["People put clothes on the world","The world is being clothed like a person","The colours are painted on","Nature wears different styles"],"a":1},{"n":9,"q":"What does the poem suggest happens after autumn 'says goodbye'?","o":["Spring arrives","Winter comes with cold","Summer begins","The world ends"],"a":1},{"n":10,"q":"The final line 'In change that teaches how all things must die' suggests the poet views autumn as:","o":["Only a sad time","A natural part of a cycle with valuable lessons","Something to fear","A punishment from nature"],"a":1}]},{"title":"Animal Life and Wild Nature","tag":"New","poem":{"title":"The Silent Hunter","author":"Sophie Bauer","lines":["The wolf moves soft across the frosted snow,","A shadow grey that barely makes a sound,","With eyes like amber burning bright and low,","No creature dares to rest upon this ground.","","Her paws create no whisper, leave no trace,","She glides through forest dark as midnight's dream,","Each muscle tense with power and with grace,","The wilderness obeys her silent scream.","","The rabbits freeze, the deer hear warnings call,","The birds take flight and scatter through the sky,","She is the pulse, the hunter after all,","The wild made flesh beneath the moon's cold eye.","","Yet in her heart there beats a mother's soul,","She hunts to feed her young before the snow falls cold."]},"questions":[{"n":1,"q":"How is the wolf described in the first stanza?","o":["Loud and aggressive","Soft, shadowy, and silent","Bright and colourful","Slow and clumsy"],"a":1},{"n":2,"q":"What does 'amber' most likely mean in the line about the wolf's eyes?","o":["Blue colour","Golden-yellow colour","Silver colour","Green colour"],"a":1},{"n":3,"q":"'No creature dares to rest upon this ground' suggests:","o":["The ground is uncomfortable","All creatures are afraid of the wolf","There is no space to rest","The weather is too cold"],"a":1},{"n":4,"q":"The line 'The wilderness obeys her silent scream' is an example of:","o":["Simile","Metaphor","Alliteration","Personification"],"a":2},{"n":5,"q":"Which literary device is used in 'A shadow grey that barely makes a sound'?","o":["Metaphor","Personification","Simile","Alliteration"],"a":2},{"n":6,"q":"The 'moon's cold eye' in line 12 is:","o":["An actual eye looking down","Personification of the moon","A description of night","A symbol of danger"],"a":1},{"n":7,"q":"What is revealed about the wolf's purpose in the final stanza?","o":["It hunts for sport","It hunts to feed her young and survive","It hunts because it is evil","It hunts to protect humans"],"a":1},{"n":8,"q":"Which word choice best describes the tone of this poem?","o":["Humorous","Terrifying","Respectful and admiring","Sad and depressing"],"a":2},{"n":9,"q":"How do 'power and grace' in line 7 work together in describing the wolf's movement?","o":["They contradict each other","They both describe strength but in different ways","Grace is more important than power","Power is more important than grace"],"a":1},{"n":10,"q":"What does the poem suggest about wild animals and motherhood?","o":["Wild animals are never mothers","Even fierce hunters have caring, protective instincts","Mothers cannot be hunters","Hunting and motherhood are unrelated"],"a":1}]},{"title":"Friendship and Connection","tag":"New","poem":{"title":"Two Souls, One Path","author":"Lucas Williams","lines":["We walk together down this winding road,","Two shadows that refuse to walk alone,","You help me carry half of all my load,","And turn my fears to seeds that we have sown.","","Through stormy days when dark clouds fill the sky,","You are the light that keeps my spirit bright,","When stumbling stones make all my courage die,","You lift me up and hold me through the night.","","Your laughter rings like bells throughout my days,","And weaves a golden thread through all I do,","You guide me gently through the tangled maze,","And show me life's wonderful points of view.","","So here's to you, my friend, forever true,","For life is better when I'm sharing it with you."]},"questions":[{"n":1,"q":"What does the poem say about the two friends in the first stanza?","o":["They walk alone","They help each other carry burdens","They are afraid of each other","They walk on different paths"],"a":1},{"n":2,"q":"'Two shadows that refuse to walk alone' uses which literary device?","o":["Simile","Metaphor","Personification","Alliteration"],"a":1},{"n":3,"q":"In the second stanza, the friend is described as 'the light'. This suggests the friend:","o":["Creates actual light","Brings hope and positivity during difficult times","Lights a torch","Is very bright"],"a":1},{"n":4,"q":"What is the best meaning of 'sown' in the first stanza?","o":["Thrown away","Planted or created seeds of hope","Forgotten about","Lost forever"],"a":1},{"n":5,"q":"The line 'Your laughter rings like bells throughout my days' is:","o":["Personification of bells","A simile comparing laughter to bells","A metaphor for laughter","Alliteration"],"a":1},{"n":6,"q":"Which phrase shows alliteration in the poem?","o":["Your laughter rings","Two shadows that refuse","Golden thread","Stumbling stones"],"a":3},{"n":7,"q":"'A golden thread through all I do' represents:","o":["An actual thread in clothing","The way the friend is connected to all parts of the poet's life","A golden colour","Something to hold onto"],"a":1}, function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateHumanitiesTest() {
  const fiction = pickRandom(HUMANITIES_BANK.fiction);
  const biography = pickRandom(HUMANITIES_BANK.biography);
  const science = pickRandom(HUMANITIES_BANK.science);
  const poetry = pickRandom(HUMANITIES_BANK.poetry);
  const passages = [fiction, biography, science, poetry];
  let qNum = 1;
  return passages.map((p, pi) => {
    const renumbered = p.questions.map((q, qi) => ({ ...q, n: qNum + qi }));
    qNum += p.questions.length;
    return { ...p, questions: renumbered, passageIndex: pi + 1 };
  });
}

function generateMathsTest() {
  return MATHS_BANK.map(type => {
    const variant = pickRandom(type.variants);
    return { type: type.type, title: type.title, ...variant };
  });
}

// TIMER HOOK
// ═══════════════════════════════════════════════════════════════════════

function useTimer(initialSeconds, onTimeUp) {
  const [seconds, setSeconds] = useState(initialSeconds);
  const [running, setRunning] = useState(false);
  const cbRef = useRef(onTimeUp);
  cbRef.current = onTimeUp;
  useEffect(() => {
    if (!running || seconds <= 0) return;
    const id = setInterval(() => {
      setSeconds(s => {
        if (s <= 1) { clearInterval(id); setRunning(false); cbRef.current?.(); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running, seconds]);
  const start = useCallback(() => setRunning(true), []);
  const stop = useCallback(() => setRunning(false), []);
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  const display = mins + ":" + secs.toString().padStart(2, "0");
  const urgent = seconds < 120 && seconds > 0;
  return { seconds, display, running, start, stop, urgent };
}

function MiniTable({ data, header, caption }) {

const btnBase = { border:"none", borderRadius:8, padding:"8px 16px", fontSize:14, fontWeight:600, cursor:"pointer", transition:"all 0.15s" };

function MCQQuestion({ qData, index, selected, onSelect, showResult }) {
  const correct = qData.a;
  const isCorrect = selected === correct;
  return (
    <div style={{ marginBottom:16, padding:"12px 16px", backgroundColor: showResult ? (isCorrect ? "#f0fdf4" : selected !== undefined ? "#fef2f2" : "#f8fafc") : "#f8fafc", borderRadius:8, border: "1px solid " + (showResult ? (isCorrect ? "#86efac" : selected !== undefined ? "#fca5a5" : "#e2e8f0") : "#e2e8f0") }}>
      <div style={{ fontWeight:600, fontSize:14, marginBottom:8 }}>{qData.n}. {qData.q}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {qData.o.map((opt, oi) => {
          const isSel = selected === oi;
          const isCor = oi === correct;
          let bg = "#fff", bdr = "#d1d5db", fw = 400;
          if (showResult) {
            if (isCor) { bg = "#dcfce7"; bdr = "#22c55e"; fw = 600; }
            else if (isSel && !isCor) { bg = "#fee2e2"; bdr = "#ef4444"; }
          } else if (isSel) { bg = "#dbeafe"; bdr = "#3b82f6"; fw = 600; }
          return (
            <label key={oi} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:6, backgroundColor:bg, border:"1px solid "+bdr, cursor:showResult?"default":"pointer", fontWeight:fw, fontSize:14 }} onClick={() => !showResult && onSelect(index, oi)}>
              <span style={{ width:22, height:22, borderRadius:"50%", border:"2px solid "+(isSel?"#3b82f6":"#9ca3af"), backgroundColor:isSel?"#3b82f6":"#fff", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:12, fontWeight:700, flexShrink:0 }}>{LETTERS[oi]}</span>
              {opt}
              {showResult && isCor && <span style={{ marginLeft:"auto", color:"#16a34a", fontSize:16 }}>✓</span>}
              {showResult && isSel && !isCor && <span style={{ marginLeft:"auto", color:"#dc2626", fontSize:16 }}>✗</span>}
            </label>
          );
        })}
      </div>
    </div>
  );
}

function TimerBar({ timer, answered, total, onSubmit, submitted }) {
  return (

      {!submitted && <button onClick={onSubmit} style={{ ...btnBase, backgroundColor:"#16a34a", color:"#fff" }}>Submit Test</button>}
    </div>

function ScoreBanner({ score, total }) {
  const pct = score / total;
  const bg = pct >= 0.7 ? "#f0fdf4" : pct >= 0.5 ? "#fefce8" : "#fef2f2";
  const bdr = pct >= 0.7 ? "#22c55e" : pct >= 0.5 ? "#eab308" : "#ef4444";
  return (
    <div style={{ backgroundColor:bg, border:"2px solid "+bdr, borderRadius:12, padding:20, marginBottom:20, textAlign:"center" }}>
      <div style={{ fontSize:36, fontWeight:800 }}>{score} / {total}</div>
      <div style={{ fontSize:16, color:"#475569" }}>{Math.round(pct * 100)}% correct</div>
      <div style={{ fontSize:14, marginTop:8, color:"#64748b" }}>Scroll down to review your answers</div>
    </div>
  );
}

function HumanitiesSection({ onBack, onScore }) {
  const [passages] = useState(() => generateHumanitiesTest());
  const allQs = passages.flatMap(p => p.questions);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(null);
  const timer = useTimer(40 * 60, () => handleSubmit());
  const [started, setStarted] = useState(false);

  const handleSelect = (qi, oi) => { if (!submitted) setAnswers(prev => ({ ...prev, [qi]: oi })); };
  const handleSubmit = () => {
    timer.stop();
    let c = 0;
    allQs.forEach((q, i) => { if (answers[i] === q.a) c++; });
    setScore(c);
    setSubmitted(true);
    if (onScore) onScore(c, allQs.length);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const answered = Object.keys(answers).length;
  const total = allQs.length;

  if (!started) {
    return (
      <div style={{ maxWidth:780, margin:"0 auto" }}>
        <button onClick={onBack} style={{ ...btnBase, marginBottom:16, backgroundColor:"#f1f5f9", color:"#334155" }}>← Back to Menu</button>
        <h2 style={{ fontSize:22, fontWeight:700, marginBottom:8 }}>Section 2: Humanities</h2>
        <p style={{ color:"#64748b", marginBottom:4 }}>{total} multiple-choice questions · 40 minutes</p>
        <p style={{ color:"#64748b", marginBottom:16, fontSize:13 }}>4 passages randomly selected: Fiction, Biography, Science, Poetry</p>
        <div style={{ backgroundColor:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:12, padding:24, textAlign:"center" }}>
          <p style={{ fontSize:15, marginBottom:20, color:"#475569" }}>Read each passage carefully, then answer the questions. Press <strong>Start</strong> when ready.</p>
          <button onClick={() => { setStarted(true); timer.start(); }} style={{ ...btnBase, backgroundColor:"#2563eb", color:"#fff", fontSize:16, padding:"10px 32px" }}>Start Test</button>
        </div>
      </div>
    );
  }

  let qIdx = 0;
  return (
    <div style={{ maxWidth:780, margin:"0 auto" }}>
      <button onClick={onBack} style={{ ...btnBase, marginBottom:16, backgroundColor:"#f1f5f9", color:"#334155" }}>← Back to Menu</button>
      <TimerBar timer={timer} answered={answered} total={total} onSubmit={handleSubmit} submitted={submitted} />
      {submitted && score !== null && <ScoreBanner score={score} total={total} />}
      {passages.map((passage, pi) => {
        const startIdx = qIdx;
        qIdx += passage.questions.length;
        return (
          <div key={pi} style={{ marginBottom:32 }}>
            <h3 style={{ fontSize:18, fontWeight:700, marginBottom:4 }}>
              Passage {passage.passageIndex}: {passage.title}
              <TagBadge tag={passage.tag} />
            </h3>
            {passage.text && (
              <div style={{ backgroundColor:"#f8fafc", borderLeft:"4px solid #3b82f6", padding:"12px 16px", marginBottom:16, borderRadius:"0 8px 8px 0", fontSize:14, lineHeight:1.7, whiteSpace:"pre-wrap", color:"#1e293b" }}>{passage.text}</div>
            )}
            {passage.poem && (
              <div style={{ backgroundColor:"#faf5ff", borderLeft:"4px solid #8b5cf6", padding:"16px 20px", marginBottom:12, borderRadius:"0 8px 8px 0" }}>
                <div style={{ fontWeight:700, fontSize:16, marginBottom:2 }}>{passage.poem.title}</div>
                <div style={{ fontSize:13, color:"#6b7280", marginBottom:10, fontStyle:"italic" }}>{passage.poem.author}</div>
                {passage.poem.lines.map((line, li) => <div key={li} style={{ fontSize:14, fontStyle:"italic", lineHeight:1.8, minHeight:line?"auto":12 }}>{line || " "}</div>)}
              </div>
            )}
            {passage.glossary && (
              <div style={{ backgroundColor:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:8, padding:"10px 14px", marginBottom:16 }}>
                <div style={{ fontWeight:700, fontSize:13, color:"#166534", marginBottom:4 }}>Glossary</div>
                {passage.glossary.map((g, gi) => <div key={gi} style={{ fontSize:13 }}><strong>{g.term}</strong> — {g.def}</div>)}
              </div>
            )}
            {passage.questions.map((q, qi) => (
              <MCQQuestion key={q.n} qData={q} index={startIdx + qi} selected={answers[startIdx + qi]} onSelect={handleSelect} showResult={submitted} />
            ))}
          </div>
        );
      })}
      {!submitted && (
        <div style={{ textAlign:"center", padding:"20px 0" }}>
          <button onClick={handleSubmit} style={{ ...btnBase, backgroundColor:"#2563eb", color:"#fff", fontSize:16, padding:"12px 40px" }}>Submit Test ({answered}/{total} answered)</button>
        </div>
      )}
    </div>
  );
}

  const handleSubmit = () => {
    timer.stop();
    let c = 0;
    allQs.forEach((q, i) => { if (answers[i] === q.a) c++; });
    setScore(c);
    setSubmitted(true);
    if (onScore) onScore(c, allQs.length);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const answered = Object.keys(answers).length;
  const total = allQs.length;

  if (!started) {
    return (
      <div style={{ maxWidth:780, margin:"0 auto" }}>
        <button onClick={onBack} style={{ ...btnBase, marginBottom:16, backgroundColor:"#f1f5f9", color:"#334155" }}>← Back to Menu</button>
        <h2 style={{ fontSize:22, fontWeight:700, marginBottom:8 }}>Section 3: Mathematics</h2>
        <p style={{ color:"#64748b", marginBottom:4 }}>{total} multiple-choice questions · 40 minutes · No calculators</p>
        <p style={{ color:"#64748b", marginBottom:16, fontSize:13 }}>21 question types, each randomly selected from the bank</p>
        <div style={{ backgroundColor:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:12, padding:24, textAlign:"center" }}>
          <p style={{ fontSize:15, marginBottom:20, color:"#475569" }}>Read each question carefully. You may use scratch paper. Press <strong>Start</strong> when ready.</p>
          <button onClick={() => { setStarted(true); timer.start(); }} style={{ ...btnBase, backgroundColor:"#2563eb", color:"#fff", fontSize:16, padding:"10px 32px" }}>Start Test</button>
        </div>
      </div>
    );
  }

  let qIdx = 0;
  return (
    <div style={{ maxWidth:780, margin:"0 auto" }}>
      <button onClick={onBack} style={{ ...btnBase, marginBottom:16, backgroundColor:"#f1f5f9", color:"#334155" }}>← Back to Menu</button>
      <TimerBar timer={timer} answered={answered} total={total} onSubmit={handleSubmit} submitted={submitted} />
      {submitted && score !== null && <ScoreBanner score={score} total={total} />}
      {groups.map((group, gi) => {
        const startIdx = qIdx;
        qIdx += group.questions.length;
        return (
          <div key={gi} style={{ marginBottom:28 }}>
            <h3 style={{ fontSize:16, fontWeight:700, marginBottom:4 }}>{group.title}<TagBadge tag={group.tag} /></h3>
            {group.intro && <p style={{ fontSize:14, color:"#475569", marginBottom:8 }}>{group.intro}</p>}
            {group.table && <MiniTable data={group.table.rows} header={group.table.header} caption={group.table.caption} />}
            {group.questions.map((q, qi) => (
              <MCQQuestion key={q.n} qData={q} index={startIdx + qi} selected={answers[startIdx + qi]} onSelect={handleSelect} showResult={submitted} />
            ))}
          </div>
        );
      })}
      {!submitted && (
        <div style={{ textAlign:"center", padding:"20px 0" }}>
          <button onClick={handleSubmit} style={{ ...btnBase, backgroundColor:"#2563eb", color:"#fff", fontSize:16, padding:"12px 40px" }}>Submit Test ({answered}/{total} answered)</button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// PROFILE & STATS COMPONENTS
// ═══════════════════════════════════════════════════════════════════════

function StatsCard({ scores, color }) {
  if (!scores || scores.length === 0) return (
    <div style={{ fontSize:12, color:"#94a3b8", fontStyle:"italic", marginTop:4 }}>No tests taken yet</div>
  );
  const pcts = scores.map(s => Math.round((s.score / s.total) * 100));
  const avg = Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length);
  const best = Math.max(...pcts);
  const worst = Math.min(...pcts);
  return (
    <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:color+"11", color:color, fontWeight:600 }}>Tests: {scores.length}</span>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:"#f0f9ff", color:"#0369a1", fontWeight:600 }}>Avg: {avg}%</span>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:"#f0fdf4", color:"#15803d", fontWeight:600 }}>Best: {best}%</span>
      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:6, backgroundColor:"#fef2f2", color:"#b91c1c", fontWeight:600 }}>Worst: {worst}%</span>
    </div>
  );
}

function ProfileManager({ profiles, currentUser, onSelect, onCreate, onDelete, onExport, onImport }) {
  const [newName, setNewName] = useState("");
  const [showForm, setShowForm] = useState(false);
  const fileInputRef = useRef(null);
  const handleCreate = () => {
    const trimmed = newName.trim();
    if (trimmed && !profiles.find(p => p.name === trimmed)) {
      onCreate(trimmed);
      setNewName("");
      setShowForm(false);
    }
  };
  const handleImportClick = () => { if (fileInputRef.current) fileInputRef.current.click(); };
  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (onImport) onImport(data);
      } catch(err) { alert("Invalid profile file. Please select a valid JSON export."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };
  return (
    <div style={{ marginBottom:24, padding:16, backgroundColor:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:profiles.length > 0 ? 12 : 0, flexWrap:"wrap", gap:8 }}>
        <div style={{ fontWeight:700, fontSize:14, color:"#334155" }}>👤 User Profiles</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {!showForm && <button onClick={() => setShowForm(true)} style={{ ...btnBase, fontSize:12, padding:"4px 12px", backgroundColor:"#2563eb", color:"#fff" }}>+ New Profile</button>}
          {profiles.length > 0 && <button onClick={onExport} style={{ ...btnBase, fontSize:12, padding:"4px 12px", backgroundColor:"#059669", color:"#fff" }}>Export</button>}
          <button onClick={handleImportClick} style={{ ...btnBase, fontSize:12, padding:"4px 12px", backgroundColor:"#d97706", color:"#fff" }}>Import</button>
          <input ref={fileInputRef} type="file" accept=".json" onChange={handleFileChange} style={{ display:"none" }} />
        </div>
      </div>
      {showForm && (
        <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center" }}>
          <input value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleCreate()} placeholder="Enter name..." style={{ flex:1, padding:"6px 12px", borderRadius:8, border:"1px solid #cbd5e1", fontSize:14, outline:"none" }} autoFocus />
          <button onClick={handleCreate} style={{ ...btnBase, fontSize:12, padding:"6px 14px", backgroundColor:"#16a34a", color:"#fff" }}>Add</button>
          <button onClick={() => { setShowForm(false); setNewName(""); }} style={{ ...btnBase, fontSize:12, padding:"6px 14px", backgroundColor:"#f1f5f9", color:"#64748b" }}>Cancel</button>
        </div>
      )}
      {profiles.length === 0 && !showForm && (
        <div style={{ fontSize:13, color:"#94a3b8", textAlign:"center", padding:"8px 0" }}>No profiles yet. Create one to start tracking results!</div>
      )}
      {profiles.length > 0 && (
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {profiles.map(p => (
            <div key={p.name} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <button onClick={() => onSelect(p.name)} style={{ ...btnBase, fontSize:13, padding:"6px 16px", backgroundColor:currentUser === p.name ? "#2563eb" : "#fff", color:currentUser === p.name ? "#fff" : "#334155", border:currentUser === p.name ? "2px solid #2563eb" : "1px solid #cbd5e1", fontWeight:currentUser === p.name ? 700 : 400 }}>{p.name}</button>
              <button onClick={() => onDelete(p.name)} style={{ border:"none", background:"none", cursor:"pointer", fontSize:14, color:"#94a3b8", padding:"2px 4px", lineHeight:1 }} title={"Remove " + p.name}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════

// Storage helpers for persistence
const STORAGE_KEY = "acer_practice_profiles";
const STORAGE_USER_KEY = "acer_practice_current_user";

function loadProfiles() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed)) return parsed; }
  } catch(e) {}
  return [];
}

function saveProfiles(profiles) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); } catch(e) {}
}

function loadCurrentUser() {
  try { return localStorage.getItem(STORAGE_USER_KEY) || null; } catch(e) { return null; }
}

function saveCurrentUser(name) {
  try {
    if (name) localStorage.setItem(STORAGE_USER_KEY, name);
    else localStorage.removeItem(STORAGE_USER_KEY);
  } catch(e) {}
}

function App() {
  const [view, setView] = useState("menu");
  const [key, setKey] = useState(0);
  const [profiles, setProfiles] = useState(() => loadProfiles());
  const [currentUser, setCurrentUser] = useState(() => loadCurrentUser());

  // Persist profiles whenever they change
  useEffect(() => { saveProfiles(profiles); }, [profiles]);
  useEffect(() => { saveCurrentUser(currentUser); }, [currentUser]);

  const startSection = (v) => { setKey(k => k + 1); setView(v); };
  const backToMenu = () => setView("menu");

  const createProfile = (name) => {
    setProfiles(prev => [...prev, { name, humanities: [], maths: [] }]);
    setCurrentUser(name);
  };
  const selectProfile = (name) => setCurrentUser(name);
  const deleteProfile = (name) => {
    setProfiles(prev => prev.filter(p => p.name !== name));
    if (currentUser === name) setCurrentUser(null);
  };

  const exportProfiles = () => {
    const data = JSON.stringify({ profiles, currentUser, exportDate: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "acer_profiles_" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const importProfiles = (data) => {
    if (data && Array.isArray(data.profiles)) {
      setProfiles(data.profiles);
      if (data.currentUser) setCurrentUser(data.currentUser);
    }
  };

  const recordScore = (section, score, total) => {
    if (!currentUser) return;
    setProfiles(prev => prev.map(p => {
      if (p.name !== currentUser) return p;
      return { ...p, [section]: [...p[section], { score, total, date: Date.now() }] };
    }));
  };

  const currentProfile = profiles.find(p => p.name === currentUser);

  if (view === "we1") return <WritingSection key={key} title="Section 1: Written Expression" time={25*60} promptBank={WE1_PROMPTS} onBack={backToMenu} />;
  if (view === "humanities") return <HumanitiesSection key={key} onBack={backToMenu} onScore={(s, t) => recordScore("humanities", s, t)} />;
  if (view === "maths") return <MathsSection key={key} onBack={backToMenu} onScore={(s, t) => recordScore("maths", s, t)} />;
  if (view === "we4") return <WritingSection key={key} title="Section 4: Written Expression" time={25*60} promptBank={WE4_PROMPTS} onBack={backToMenu} />;

  const cards = [
    { id:"we1", title:"Section 1: Written Expression", desc:"Persuasive essay — random prompt from bank of 25", time:"25 min", icon:"✍️", color:"#8b5cf6", stats:null },
    { id:"humanities", title:"Section 2: Humanities", desc:"40 questions — 4 random passages from 32 (fiction, biography, science, poetry)", time:"40 min", icon:"📖", color:"#3b82f6", stats:currentProfile ? currentProfile.humanities : null },
    { id:"maths", title:"Section 3: Mathematics", desc:"42 questions — 21 types, each randomly selected", time:"40 min", icon:"🔢", color:"#059669", stats:currentProfile ? currentProfile.maths : null },
    { id:"we4", title:"Section 4: Written Expression", desc:"Creative writing — random prompt from bank of 25", time:"25 min", icon:"✨", color:"#d97706", stats:null },
  ];

  return (
    <div style={{ maxWidth:680, margin:"0 auto", padding:"16px 0" }}>
      <div style={{ textAlign:"center", marginBottom:24 }}>
        <h1 style={{ fontSize:26, fontWeight:800, color:"#0f172a", marginBottom:4 }}>ACER Scholarship Practice Test</h1>
        <p style={{ fontSize:15, color:"#64748b", marginBottom:4 }}>Randomised Practice Tests — For Lili</p>
        <p style={{ fontSize:12, color:"#94a3b8" }}>Each attempt generates a new test from the question bank</p>
        <div style={{ display:"flex", justifyContent:"center", gap:12, marginTop:12, flexWrap:"wrap" }}>
          {Object.entries(TAG_COLORS).map(([tag, c]) => (
            <span key={tag} style={{ fontSize:12, padding:"2px 10px", borderRadius:12, backgroundColor:c.bg, color:c.text, border:"1px solid "+c.border }}>{tag}</span>
          ))}
        </div>
      </div>
      <ProfileManager profiles={profiles} currentUser={currentUser} onSelect={selectProfile} onCreate={createProfile} onDelete={deleteProfile} onExport={exportProfiles} onImport={importProfiles} />
      {currentUser && (
        <div style={{ marginBottom:16, padding:"8px 16px", backgroundColor:"#eff6ff", borderRadius:8, border:"1px solid #bfdbfe", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:14, color:"#1e40af" }}>🎯 Tracking results for <strong>{currentUser}</strong></span>
        </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {cards.map(s => (
          <button key={s.id} onClick={() => startSection(s.id)} style={{ display:"flex", alignItems:"center", gap:16, padding:"18px 20px", border:"1px solid #e2e8f0", borderRadius:12, backgroundColor:"#fff", cursor:"pointer", textAlign:"left", transition:"all 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = s.color; e.currentTarget.style.boxShadow = "0 2px 8px " + s.color + "22"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "#e2e8f0"; e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.06)"; }}>
            <span style={{ fontSize:32 }}>{s.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:700, fontSize:16, color:"#0f172a" }}>{s.title}</div>
              <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>{s.desc}</div>
              {s.stats !== null && currentUser && <StatsCard scores={s.stats} color={s.color} />}
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
              <span style={{ fontSize:13, fontWeight:600, color:s.color, backgroundColor:s.color+"11", padding:"2px 10px", borderRadius:8 }}>{s.time}</span>
              <span style={{ fontSize:20, color:"#94a3b8" }}>→</span>
            </div>
          </button>
        ))}
      </div>
      <div style={{ textAlign:"center", marginTop:24, padding:"16px", backgroundColor:"#f8fafc", borderRadius:8, border:"1px solid #e2e8f0" }}>
        <div style={{ fontSize:13, fontWeight:600, color:"#475569", marginBottom:4 }}>Question Bank Size</div>
        <div style={{ fontSize:12, color:"#64748b" }}>
          25 persuasive prompts · 25 creative prompts · 32 reading passages (320 questions) · 126 maths variants (252 questions)
        </div>
      </div>
      <div style={{ textAlign:"center", marginTop:16, fontSize:12, color:"#94a3b8" }}>Based on ACER Scholarship Practice Tests (Australian Council for Educational Research)</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
