const HUMANITIES_BANK = {"fiction":[{"title":"Mia at the Robotics Competition","tag":"New","text":"The gymnasium buzzed with excitement as teams from six schools arranged their robots on the competition course. Mia, thirteen, adjusted the wheels on her team's entry, \"Atlas\", and glanced at the obstacle track: a ramp, a narrow bridge, and a target zone at the end.\n\nAcross the hall, she noticed Daniel from Hillcrest Academy kneeling beside his robot, \"Nexus\". It had stalled halfway through its practice run for the third time. Mia walked over. \"What's causing the stall?\" she asked.\n\n\"I think the motor controller is overheating,\" Daniel sighed, turning Nexus on its side. Mia crouched down and traced the wiring with her finger. \"There — that connector is loose. The signal drops every time Nexus turns.\" She pressed the cable firmly back into its socket.\n\nDaniel restarted Nexus. The robot rolled smoothly up the ramp, crossed the bridge without hesitation, and stopped precisely in the target zone. Daniel leapt to his feet. \"You saved us!\"\n\nTheir supervisor, Mr. Okonkwo, had been watching from the judges' table. He approached Mia quietly. \"Your technical instinct is remarkable,\" he said. \"Not many students can diagnose a wiring fault that quickly.\"\n\nLater, while packing up Atlas, Mia found a small sticky note tucked beneath the chassis. It read: \"Check the supply cabinet — Room 14.\" Curious, she slipped away and opened the cabinet. Inside sat a prototype ultrasonic sensor, still in its packaging, labelled \"Regional Robotics Prize — Bonus Component\". None of the other teams had seen it. Mia carried it back to her team, already imagining how it could transform Atlas for the finals.","questions":[{"n":1,"q":"The gymnasium is described as \"buzzing\" because:","o":["the machines were malfunctioning","the lights were flickering","teams were actively preparing","the judges were arguing"],"a":2},{"n":2,"q":"Mia's question to Daniel suggests she is:","o":["bored with the competition","critical of his robot's design","curious and willing to help","eager to leave early"],"a":2},{"n":3,"q":"The loose connector caused Nexus to:","o":["overheat permanently","lose signal during turns","run faster than expected","cross the bridge early"],"a":1},{"n":4,"q":"Mr. Okonkwo's comment about Mia indicates he:","o":["thinks she needs more training","admires her diagnostic ability","is frustrated with Daniel","wants to replace the judges"],"a":1},{"n":5,"q":"The word \"precisely\" in the passage means:","o":["slowly","roughly","exactly","randomly"],"a":2},{"n":6,"q":"Daniel's reaction after the fix shows he is:","o":["upset at Mia's interference","grateful for her help","confused by the result","proud only of his own effort"],"a":1},{"n":7,"q":"The sticky note under Atlas suggests that:","o":["Daniel planted a prank","a hidden opportunity exists","Mia should stop competing","the judges made an error"],"a":1},{"n":8,"q":"Finding the note shows that Mia is:","o":["careless with equipment","impatient during pack-up","observant and attentive","uninterested in details"],"a":2},{"n":9,"q":"The passage is mainly about:","o":["a rivalry between two schools","the rules of robotics competitions","Mia's technical skill and curiosity","Mr. Okonkwo's teaching methods"],"a":2},{"n":10,"q":"The passage suggests the competition atmosphere is:","o":["hostile and unfriendly","dull and uneventful","energetic and collaborative","disorganised and confusing"],"a":2}]},{"title":"The Hidden Mural","tag":"New","text":"Kai's first morning at Riverside Middle School began with the assembly hall gathering. As six hundred students filed in, he noticed something unusual—a large burgundy curtain covered the back wall, completely obscuring whatever lay behind it.\n\nDuring the headmaster's speech, Kai could not stop staring at the covered section. The edges of the curtain revealed hints of colour: bright blues, deep reds, and golds. What was it? Why was it hidden?\n\nAfter assembly, he lingered behind. The halls emptied quickly as students rushed to their first classes. Kai approached the curtain cautiously and lifted one edge. Behind it stretched a mural unlike anything he had seen before—a sprawling landscape of mountains, forests, and animals painted in vibrant detail across the entire wall.\n\nThe colours seemed to glow. Each creature—a wolf, an eagle, a bear—appeared almost alive. In the bottom corner, a small signature read: \"M. Patel, Class of 1997.\"\n\nMs. Rivera, the art teacher, found him standing there, jaw open. Instead of scolding him for being late, she smiled. \"Beautiful, isn't it? Meera Patel painted that twenty-five years ago, right before she left for art school. She later became an award-winning muralist.\"\n\n\"Why is it covered?\" Kai asked.\n\n\"The school is renovating. They wanted to protect it,\" Ms. Rivera explained. \"Would you like to help me create an exhibition about former student artists? We could feature Meera's journey.\"\n\nKai nodded eagerly. He had finally found something that made his new school feel like home.","questions":[{"n":1,"q":"Kai first notices the mural through:","o":["a tour guide's explanation","hints of colour at the curtain's edges","friends pointing it out","a school brochure"],"a":1},{"n":2,"q":"The mural's hidden location suggests it is:","o":["not important to the school","being protected during renovation","waiting to be destroyed","too expensive to display"],"a":1},{"n":3,"q":"Kai's decision to look behind the curtain shows he is:","o":["dishonest and rule-breaking","curious and impulsive","angry at the school","bored with assembly"],"a":1},{"n":4,"q":"Ms. Rivera's response to finding Kai indicates she:","o":["is angry at him","values student curiosity about art","wants him to leave immediately","does not recognise the mural"],"a":1},{"n":5,"q":"The phrase 'each creature appeared almost alive' suggests the artist's:","o":["inexperience with animals","skill in creating realism","confusion about painting","lack of colour knowledge"],"a":1},{"n":6,"q":"Meera Patel became known as a:","o":["teacher","landscape gardener","award-winning muralist","museum curator"],"a":2},{"n":7,"q":"The mural has been covered because:","o":["it is too old","students damaged it","the school is renovating","the artist requested it"],"a":2},{"n":8,"q":"Ms. Rivera's invitation to Kai suggests she believes:","o":["he should be punished","he should join her project","art is not important","he is not trustworthy"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["describe different painting techniques","explain school renovation schedules","show how art can connect a student to a new community","list famous muralists from 1997"],"a":2},{"n":10,"q":"At the end, Kai feels:","o":["afraid of the new school","connected to the school through discovery","upset about the mural","uncertain about his future"],"a":1}]},{"title":"The Time Capsule","tag":"New","text":"Elena was kneeling in the school garden, pulling weeds from the vegetable beds, when her trowel struck something hard. She carefully brushed away the soil and discovered a small metal box, green with age and completely sealed.\n\n\"What is that?\" asked her classmate, Marcus, peering over her shoulder.\n\nElena lifted the box carefully. It was heavier than expected. Carved into its lid were words so worn they were barely visible: \"Sealed 1993. Open 2020.\" It was 2024 now. The box was already overdue.\n\nThey brought it to Principal Mr. Chen, who examined it with great interest. \"This is wonderful,\" he said softly. \"A time capsule from thirty years ago. We should open it together, and then see what's inside.\"\n\nThat evening, with Elena and Marcus watching, Mr. Chen carefully pried open the box. Inside lay letters, photographs, and newspaper clippings. One letter was addressed to \"Future Students.\" It read: \"Dear friends of tomorrow, we hope this finds you well. We buried this time capsule to share our hopes and dreams. Perhaps you will recognise these names, or perhaps you will trace what became of us.\"\n\nThe names belonged to the Class of 1993. Mr. Chen's eyes widened with recognition. \"I taught several of these students,\" he said. \"I can help trace them.\"\n\nOver the next month, Mr. Chen and Elena tracked down former students using old yearbooks and social media. Many had become teachers, doctors, artists, and parents. Mr. Chen organised a reunion, and former students returned to read their own letters aloud. They laughed, cried, and marvelled at how their lives had unfolded since burying the capsule three decades before.","questions":[{"n":1,"q":"Elena discovers the metal box while:","o":["cleaning the school building","weeding the garden beds","searching for buried treasure","digging with Marcus"],"a":1},{"n":2,"q":"The words on the lid indicate the capsule was:","o":["buried in 2020","meant to be opened in 1993","sealed in 1993 for opening in 2020","never meant to be found"],"a":2},{"n":3,"q":"The time capsule was overdue for opening because:","o":["it was lost","it was 2024, not 2020","the school forgot about it","Marcus did not notice it"],"a":1},{"n":4,"q":"The contents of the capsule suggest the original authors wanted to:","o":["hide their secrets forever","share their hopes with future students","bury valuable items","create a mystery"],"a":1},{"n":5,"q":"Mr. Chen recognised some of the names because he:","o":["lived in 1993","had taught those students","went to school with them","kept detailed records"],"a":1},{"n":6,"q":"The tone of the letter to future students is:","o":["sad and regretful","hopeful and friendly","angry and demanding","confused and unclear"],"a":1},{"n":7,"q":"Elena and Mr. Chen traced the former students by using:","o":["old yearbooks and social media","telephone directories","newspaper advertisements","asking random people"],"a":0},{"n":8,"q":"The reunion brought together people who:","o":["had never met before","were no longer friends","wanted to see how their lives had changed","did not recognise each other"],"a":2},{"n":9,"q":"The passage is mainly about:","o":["how to preserve metals properly","celebrating the discovery of a time capsule and reconnecting with the past","teaching gardening skills to students","the history of the school building"],"a":1},{"n":10,"q":"This story suggests that time capsules are valuable because they:","o":["contain money or jewels","provide a bridge between past and present","are easy to find","never deteriorate"],"a":1}]},{"title":"The Hidden Lighthouse","tag":"New","text":"Maya had always been afraid of the sea. Her grandfather, however, loved it with a fierce passion that seemed to glow from within him like a lantern. When he invited her to visit his old lighthouse on the cliff, she almost refused. But something in his hopeful eyes made her say yes.\n\nThe lighthouse stood alone on the rocky shore, its white paint peeling like sunburnt skin. Inside, narrow stone stairs spiralled upward into darkness. Maya climbed slowly, her heart thudding in her chest with each step. Her grandfather followed behind, moving quickly despite his age.\n\nAt the top, the view took her breath away. The ocean stretched endlessly in every direction, catching the afternoon sun like hammered gold. Her grandfather placed a gentle hand on her shoulder. \"I know you're frightened,\" he said quietly. \"But fear and beauty often live together. The sea is dangerous, yes, but it's also magnificent.\"\n\nThat night, Maya watched the lighthouse beam sweep across the dark water, pushing back the shadows again and again. She understood then why her grandfather had devoted his life to this place. The lighthouse wasn't just a building—it was a promise. A promise that someone was watching, that danger wouldn't go unseen, that lost things could find their way home.\n\nWhen dawn came, Maya climbed the stairs again, this time without hesitation. She was ready to learn its secrets.","questions":[{"n":1,"q":"Why was Maya reluctant to visit her grandfather's lighthouse?","o":["The stairs were too steep","She was afraid of the sea","The lighthouse was too old","Her grandfather was unfriendly"],"a":1},{"n":2,"q":"What does the text suggest about Maya's grandfather?","o":["He wanted Maya to leave","He was frustrated with Maya","He understood Maya's fear but believed in facing it","He thought the sea was dangerous"],"a":2},{"n":3,"q":"The word 'fierce' in the passage most nearly means:","o":["Dangerous","Angry","Intense and passionate","Protective"],"a":2},{"n":4,"q":"Which detail helps explain why the lighthouse is important to Maya's grandfather?","o":["It is painted white","It has a strong beam that helps guide lost things","The stairs spiral upward","It stands on the shore"],"a":1},{"n":5,"q":"The simile 'like hammered gold' is used to describe:","o":["The lighthouse","The stairs","The ocean in sunlight","The rocky shore"],"a":2},{"n":6,"q":"Why does Maya climb the stairs without hesitation the second time?","o":["The stairs had become safer","She had discovered treasure","She understood the lighthouse's purpose and her grandfather's devotion","She was no longer afraid of her grandfather"],"a":2},{"n":7,"q":"What is the setting of this passage?","o":["A city apartment","A lighthouse on a cliff by the sea","A mountain village","A beach resort"],"a":1},{"n":8,"q":"The author describes the grandfather as moving 'quickly despite his age' mainly to show that:","o":["He was younger than he looked","His passion for the lighthouse made him energetic","He was impatient with Maya","Lighthouse work keeps people young"],"a":1},{"n":9,"q":"According to the passage, what does Maya learn from her visit?","o":["That the sea is not actually dangerous","That her grandfather was right to be afraid","That beauty and fear can exist together, and that fear can be overcome","That lighthouses are only made of stone"],"a":2},{"n":10,"q":"What is the main purpose of the final sentence of the passage?","o":["To show that Maya wants to live at the lighthouse","To suggest that Maya has changed and is ready to embrace her grandfather's world","To indicate that the lighthouse contains physical secrets","To explain that Maya will become a lighthouse keeper"],"a":1}]},{"title":"The Mystery of Blackwood Manor","tag":"New","text":"Jasper had inherited Blackwood Manor from an aunt he'd never met. The house loomed above the village like a sleeping giant, its windows dark and empty. Local children whispered that it was haunted, though Jasper suspected the truth was far more interesting than ghosts.\n\nOn his first night, while exploring the library, he found a loose brick in the fireplace. Behind it lay a leather journal, its pages yellowed with age. The handwriting inside was elegant but hurried, filled with sketches of mechanical contraptions and coded messages he couldn't decipher.\n\nEach evening, Jasper uncovered new clues. A hidden compartment beneath the floorboards contained blueprints. A dusty attic revealed shelves of chemistry equipment. Slowly, a portrait emerged: his great-uncle had been an inventor, working in secret during a time when his ideas were considered dangerous. The manor hadn't been a place of mystery—it had been a laboratory.\n\nBut the greatest discovery came last. In the journal's final entry, his great-uncle had written about a child—Jasper's own grandmother—who had helped him with his experiments. She had been forgotten by history, erased from the family story. Jasper realized that Blackwood Manor was more than a house. It was a keeper of secrets, a guardian of a family history that had been deliberately hidden.\n\nThe next morning, Jasper telephoned the local historian. The dead house would speak again, and this time, its voice would be heard.","questions":[{"n":1,"q":"Why did the village children believe Blackwood Manor was haunted?","o":["The great-uncle told them","It was dark and empty, which created mystery","There was actually a ghost living there","Jasper's aunt was a ghost"],"a":1},{"n":2,"q":"What was Jasper's great-uncle's actual profession?","o":["A teacher","A writer","An inventor working in secret","A historian"],"a":2},{"n":3,"q":"The word 'elegant' in the passage describes the quality of:","o":["The house's architecture","The leather journal's age","The handwriting in the journal","The mechanical contraptions"],"a":2},{"n":4,"q":"What clues did Jasper find that helped him understand the manor's true purpose?","o":["Ghost stories and paintings","A journal, hidden compartments, blueprints, and chemistry equipment","Letters from the village","Maps and treasure"],"a":1},{"n":5,"q":"The phrase 'house loomed above the village like a sleeping giant' is:","o":["Literal description","A simile comparing the house's imposing appearance to a sleeping giant","A metaphor about the village","Historical fact"],"a":1},{"n":6,"q":"Why was Jasper's grandmother's involvement hidden from family history?","o":["She was ashamed of the experiments","The passage suggests her role was deliberately erased, possibly because women's contributions were not valued at that time","She moved away and was forgotten","She refused to be remembered"],"a":1},{"n":7,"q":"What does Jasper's decision to contact the historian suggest about him?","o":["He wants to sell the manor","He wants to keep the secrets hidden","He believes the family's true history deserves to be known","He is afraid of Blackwood Manor"],"a":2},{"n":8,"q":"According to the text, why had the great-uncle worked in secret?","o":["He wanted to protect his work from theft","He was hiding from the authorities","His ideas were considered dangerous during his time","He was writing a novel"],"a":2},{"n":9,"q":"Which best describes Jasper's character based on the passage?","o":["He is easily frightened by old houses","He is curious and persistent in uncovering the truth","He is careless with old objects","He is uninterested in his family history"],"a":1},{"n":10,"q":"What is the main theme of this passage?","o":["Haunted houses are real","The importance of uncovering hidden family history and giving voice to forgotten people","Inventions are dangerous","Old manors are valuable"],"a":1}]},{"title":"The Last Reef Keeper","tag":"New","text":"Zara had grown up on Coral Island, where the reef was as much a part of the community as the town square. Her grandfather, the island's reef keeper, taught her to read the water like a book—to understand its moods, its rhythms, its secrets.\n\nBut lately, the reef was telling sad stories. The coral, once brilliantly coloured, had become pale and ghostly. Fish populations were dwindling. Her grandfather moved slower, his shoulders bent beneath an invisible weight.\n\n\"It's dying,\" he said one afternoon, gesturing across the water. \"And I'm failing.\"\n\nZara refused to accept his despair. She spent weeks researching in the island's small library, learning about climate change, ocean warming, and coral bleaching. She discovered that while these problems were enormous, individual actions still mattered. Communities around the world were fighting back.\n\nZara began organizing beach cleanups, persuading shopkeepers to eliminate plastic bags, and teaching other children about reef conservation. She started a small coral nursery in shallow waters, nursing damaged coral back to health.\n\nOne morning, her grandfather stood beside her at the reef's edge. A small patch of coral had recovered its colour. Around it, fish were returning. It was a tiny victory against a massive problem, but it was real.\n\n\"You haven't failed,\" Zara said, taking his weathered hand. \"You taught me. Now I'm the reef keeper too.\"\n\nHer grandfather smiled, and in that moment, the weight seemed to lift from his shoulders. The fight wasn't over, but they wouldn't face it alone.","questions":[{"n":1,"q":"What was Zara's grandfather's role on Coral Island?","o":["He was the mayor","He was the reef keeper","He was a teacher","He was a fisherman"],"a":1},{"n":2,"q":"Why was Zara's grandfather feeling despair?","o":["He was old and tired","The reef was dying and he felt he was failing to protect it","Zara had disappointed him","He wanted to leave the island"],"a":1},{"n":3,"q":"The phrase 'read the water like a book' suggests that:","o":["The water contained written messages","The grandfather could understand the water's patterns and communicate through writing","The grandfather had a deep knowledge and understanding of the water and reef","Zara needed to study a book about water"],"a":2},{"n":4,"q":"What was causing the reef's decline according to Zara's research?","o":["Overfishing only","Climate change, ocean warming, and coral bleaching","The reef keeper was incompetent","Plastic bags alone"],"a":1},{"n":5,"q":"The word 'bleaching' in this context most nearly means:","o":["Cleaning thoroughly","Making clothes white","Loss of colour in coral due to stress, turning it pale","A chemical process in water"],"a":2},{"n":6,"q":"What actions did Zara take to help the reef? (Choose the most complete answer)","o":["She wrote letters to the government","She organized beach cleanups, eliminated plastic use, created a coral nursery, and educated other children","She moved away to study marine biology","She convinced her grandfather to retire"],"a":1},{"n":7,"q":"What does Zara's statement 'I'm the reef keeper too' primarily show?","o":["She wants her grandfather's job","She is taking responsibility for the reef's future and passing on her grandfather's legacy","She is making him feel better with false hope","She plans to work alone on the reef"],"a":1},{"n":8,"q":"The story suggests that facing environmental problems requires:","o":["Only expert scientists","Government action exclusively","Individual effort combined with community action and perseverance","Giving up because the problems are too large"],"a":2},{"n":9,"q":"How does Zara respond to her grandfather's despair differently than he does?","o":["She agrees the situation is hopeless","She researches solutions and takes action rather than accepting defeat","She ignores the problem","She leaves the island"],"a":1},{"n":10,"q":"What is the main purpose of the final paragraph?","o":["To show that the reef is completely healed","To indicate that Zara's grandfather has died","To demonstrate hope and renewal—that their combined efforts are making a difference and will continue","To suggest that Zara will take over completely"],"a":2}]},{"title":"The Forgotten Champion","tag":"New","text":"Marcus had never intended to become a debater. At his new school, he was invisible—the quiet kid who sat in the back of the classroom. He preferred books to people, silence to speeches.\n\nThen Mrs. Chen, the debate coach, pulled him aside. \"I've read your essays,\" she said. \"You have something to say. You're just afraid to say it out loud.\"\n\nMarcus almost refused. But something in her conviction made him attend a practice session. The debate room felt like another world. Students spoke with passion, constructed arguments with precision, challenged each other with respect. He found himself captivated.\n\nFor weeks, Marcus researched his assigned topic: whether technology should be limited in schools. He read articles, interviewed teachers, collected evidence. During practice debates, he stumbled over his words and lost rounds to more experienced speakers.\n\nBut he persisted. Gradually, his confidence grew. His arguments became sharper. His voice, at first barely audible, began to fill the room.\n\nAt the district championship, Marcus stood at the podium against the favorite—a smooth talker from the rival school. His hands trembled. But as he spoke, something clicked. He wasn't trying to impress anyone. He was simply sharing ideas he believed in.\n\nWhen the judges announced their decision, Marcus's name was called first. He'd won.\n\nWalking offstage, he saw Mrs. Chen smiling in the audience. She'd never doubted him. Even when Marcus had doubted himself, she'd seen the champion inside the shy boy. And now, so did he.","questions":[{"n":1,"q":"What was Marcus like before joining the debate team?","o":["He was a confident speaker","He was quiet and preferred books to social interaction","He was outgoing but academically weak","He was a failed debater"],"a":1},{"n":2,"q":"Why did Mrs. Chen believe Marcus should join the debate team?","o":["He needed extracurricular activities","He had something valuable to express, despite his shyness","She wanted to help him make friends","She needed more team members"],"a":1},{"n":3,"q":"The word 'persist' in the passage most nearly means:","o":["To annoy someone repeatedly","To continue despite difficulty","To refuse to change","To memorize information"],"a":1},{"n":4,"q":"What was Marcus's debate topic?","o":["Technology in daily life","Whether schools should limit technology use","The history of computers","How to build better schools"],"a":1},{"n":5,"q":"The phrase 'The debate room felt like another world' suggests that:","o":["The room was located on another planet","It was a very different environment from the rest of the school","Debate rooms are unusual places","Marcus was dreaming"],"a":1},{"n":6,"q":"How did Marcus's performance change throughout the passage?","o":["It got worse as he became more nervous","He remained exactly the same","He gradually became more confident and skilled","He quit before improving"],"a":2},{"n":7,"q":"What does Marcus's victory at the championship reveal about him?","o":["He was always the best debater","He could succeed once he found his confidence and purpose","He won because he was naturally talented","He got lucky"],"a":1},{"n":8,"q":"Why did Marcus perform well at the championship even though his hands trembled?","o":["He wasn't nervous","He had memorized his speech perfectly","He focused on sharing ideas he believed in rather than trying to impress others","The judges felt sorry for him"],"a":2},{"n":9,"q":"Mrs. Chen's role in this story is primarily to:","o":["Give Marcus homework","Recognize his potential and support him in developing it","Teach him how to argue with people","Force him to become popular"],"a":1},{"n":10,"q":"What is the main theme of this passage?","o":["Debating is easy for everyone","With support and perseverance, people can overcome shyness and discover hidden abilities","Success is only for naturally talented people","School clubs are pointless"],"a":1}]},{"title":"The Secret in Shadow Creek","tag":"New","text":"Every summer, Olivia and her sister Elena stayed with their grandmother in the rural valley town of Shadow Creek. The town was quiet, sleepy, and utterly ordinary—or so they thought, until the summer they turned eleven and ten.\n\nIt began with a discovery. While exploring the woods behind Grandmother's house, they found an old wooden door built into a hillside, almost invisible beneath vines and moss. The girls pushed it open to reveal a hidden garden—perfectly maintained, but clearly abandoned by humans.\n\nRows of flowers bloomed in impossible colours. Herbs grew in deliberate patterns. At the centre stood a small stone cottage, its windows reflecting the afternoon light like watching eyes.\n\nInside, they found journals dating back decades, each written in the same neat handwriting. The entries described the garden's plants and their properties. Sketches showed visitors—people of various ages, seeking healing.\n\nWhen they asked Grandmother about it that evening, her response was mysterious. \"Some places hold secrets,\" she said. \"Not all secrets are meant to be told, but sometimes they're meant to be discovered. That garden has been there for generations. Our family has always been its guardians.\"\n\nOver the remaining weeks of summer, Olivia and Elena learned to care for the garden. They watered plants, recorded observations, and began to understand. This wasn't magic—it was knowledge passed down through generations. Generations of people who understood the power of nature to heal.\n\nOn their last day, Grandmother gave them each a seed from the garden. \"You're guardians now too,\" she said. \"The secret will travel with you, wherever you go.\"\n\nOlivia carefully placed the seed in her pocket. She already knew she would return next summer. Some secrets, she'd learned, were worth keeping.","questions":[{"n":1,"q":"Where did Olivia and Elena discover the hidden garden?","o":["In their grandmother's house","In the woods behind their grandmother's house","In the town square","At a local park"],"a":1},{"n":2,"q":"What made the garden seem mysterious and special?","o":["It was very large","It was perfectly maintained despite appearing abandoned, with unusual plants and a hidden cottage","It had electric lights","It was only visible at night"],"a":1},{"n":3,"q":"The word 'guardian' in the passage most nearly means:","o":["A parent or caregiver","A protector or keeper of something sacred or important","A tour guide","A person who locks doors"],"a":1},{"n":4,"q":"According to the journals found in the cottage, what was the garden's purpose?","o":["Growing food for the town","Providing plants with healing properties for visitors seeking wellness","Creating decorative flowers only","Conducting secret experiments"],"a":1},{"n":5,"q":"What did Grandmother's statement 'Some places hold secrets' imply about the garden?","o":["The garden was dangerous","It had significance beyond what appeared on the surface and had a history worth protecting","No one should visit it","It was a fictional place"],"a":1},{"n":6,"q":"What is the actual explanation for the garden's power, according to the passage?","o":["It contains real magic spells","It is based on generations of knowledge about nature's healing properties, not magic","It was created by supernatural beings","The author never explains it"],"a":1},{"n":7,"q":"Why did Grandmother give Olivia and Elena seeds from the garden?","o":["To sell them as souvenirs","To acknowledge them as new guardians of the family secret and its knowledge","Because she wanted them to grow flowers at home","As a test to see if they could remember where the garden was"],"a":1},{"n":8,"q":"What does Olivia's decision to keep the seed and return next summer reveal about her?","o":["She forgot about the garden immediately","She was disappointed by what she learned","She values the responsibility and connection to the family secret and nature's healing","She only cared about the adventure"],"a":2},{"n":9,"q":"Which detail from the passage best supports that the garden is very old?","o":["It is hidden in the woods","The journals dated back decades and were all in the same handwriting","There is a stone cottage","The vines covered the door"],"a":1},{"n":10,"q":"What is the main purpose of this passage?","o":["To teach readers how to grow herbs","To explain the history of Shadow Creek","To show how family secrets and knowledge can be discovered, valued, and passed to the next generation","To describe a vacation location"],"a":2}]}],"biography":[{"title":"Ada Lovelace: Pioneer of Computing","tag":"Sample","text":"In 1843, a young mathematician named Ada Lovelace attended a prestigious scientific conference in London. The event showcased the latest advancements in computing, and Ada was eager to share her groundbreaking work on Charles Babbage's Analytical Engine.\n\nAda had spent months developing detailed notes that described how the machine could be programmed to perform complex calculations. Her notes included what many consider to be the first algorithm intended for a machine, making her a pioneer in the field of computing.\n\nAt the conference, Ada's presentation was met with a mixture of admiration and scepticism. While some attendees praised her innovative thinking, others doubted the practicality of her ideas. Despite the mixed reception, Ada remained confident in her work.\n\n\"Your vision for this machine is truly extraordinary,\" said Charles Babbage, who had been collaborating with Ada. \"You have seen possibilities that no one else has imagined.\"\n\nAfter the conference, Ada was approached by a publisher who wanted to print her notes. However, Ada declined, choosing instead to continue refining her work. She believed that her notes needed further development before they could be shared with the wider public.\n\nAda's dedication paid off. Her refined notes were eventually published and received widespread acclaim. Today, Ada Lovelace is celebrated as one of the founders of computer science, and her contributions continue to inspire generations of scientists and mathematicians.","questions":[{"n":1,"q":"The passage is set during a time when:","o":["computers were already widespread","computing ideas were just emerging","women commonly led scientific research","algorithms were used in everyday life"],"a":1},{"n":2,"q":"Ada's notes described:","o":["blueprints for building machines","algorithms for computing","speeches for conferences","plans for publishing books"],"a":1},{"n":3,"q":"The scepticism at the conference suggests that some people:","o":["admired Ada's youth","questioned the practicality of her ideas","fully supported her work","ignored her presentation entirely"],"a":1},{"n":4,"q":"When Babbage calls Ada's vision \"extraordinary\", he means she was:","o":["impractical in her thinking","forward-thinking and visionary","careless about details","uninterested in praise"],"a":1},{"n":5,"q":"Ada declined the publisher because she wanted to:","o":["gain more fame first","continue refining her work","earn more money","seek public approval"],"a":1},{"n":6,"q":"Babbage helped Ada by:","o":["publishing her notes himself","encouraging and supporting her ideas","building the Analytical Engine alone","presenting her work at the conference"],"a":1},{"n":7,"q":"The passage suggests Ada's work:","o":["was quickly forgotten","shaped the foundations of computing","caused major controversy","failed to impress anyone"],"a":1},{"n":8,"q":"The word \"acclaim\" most closely means:","o":["criticism","praise","confusion","secrecy"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["describe a scientific conference","highlight Ada Lovelace's contributions","explain how computing machines work","criticise doubters of new ideas"],"a":1},{"n":10,"q":"Ada's story is inspiring because it shows:","o":["instant recognition of talent","perseverance despite obstacles","complete reliance on others","avoidance of challenges"],"a":1}]},{"title":"Mary Anning: The Fossil Hunter","tag":"New","text":"Mary Anning was born in 1799 in Lyme Regis, a small seaside town on the coast of Dorset, England. Her family was poor, and there were few opportunities for girls to receive formal education. However, Mary's curiosity about the natural world could not be stopped.\n\nAt age twelve, Mary made a discovery that would change the history of science. While exploring the cliffs near her home, she uncovered the complete skeleton of an ichthyosaur—a large marine reptile that had lived millions of years before. This find was extraordinary, as almost no one had ever seen such a complete fossil.\n\nWord of her discovery spread through the scientific community. Scientists and collectors travelled to Lyme Regis to meet the remarkable young girl who had found such a treasure. However, Mary faced a serious obstacle: she was a woman in a male-dominated field.\n\nDespite her achievements, many scientists of her time refused to acknowledge her work properly. They took credit for her discoveries, published her findings under male names, or claimed the fossils belonged to other collectors. Mary persisted, continuing to search the cliffs year after year.\n\nOver her lifetime, Mary discovered many important fossils, including a complete plesiosaur skeleton. Her findings revolutionised scientific understanding of prehistoric life. Museums and universities that once ignored her work now proudly display her discoveries.\n\nMary Anning died in 1847 at age forty-seven, never receiving the recognition she deserved during her lifetime. However, her legacy endured. She is now celebrated as one of the greatest palaeontologists in history, and her work laid the foundation for the science of palaeontology itself.","questions":[{"n":1,"q":"Mary Anning's family situation was:","o":["wealthy and well-educated","poor with limited opportunities","involved in scientific work","living in London"],"a":1},{"n":2,"q":"Mary's most famous discovery at age twelve was:","o":["a plesiosaur skeleton","an ichthyosaur skeleton","dinosaur footprints","ancient human remains"],"a":1},{"n":3,"q":"The main obstacle Mary faced was:","o":["difficulty finding fossils","lack of interest from scientists","prejudice against women in science","poor health"],"a":2},{"n":4,"q":"The passage suggests that male scientists:","o":["fully supported Mary's work","often claimed credit for her discoveries","helped her publish her research","lived in Lyme Regis"],"a":1},{"n":5,"q":"Mary's discoveries changed understanding of:","o":["modern sea creatures","human evolution","geological formations","prehistoric life"],"a":3},{"n":6,"q":"The word \"persisted\" most closely means:","o":["gave up easily","continued despite difficulties","moved away from fossils","became discouraged"],"a":1},{"n":7,"q":"Mary's work laid the foundation for:","o":["marine biology alone","geology exclusively","the science of palaeontology","diving expeditions"],"a":2},{"n":8,"q":"Mary's recognition came:","o":["quickly after her first discovery","during her lifetime","long after her death","through wealthy patrons"],"a":2},{"n":9,"q":"The main purpose of this passage is to:","o":["explain how fossils form","describe Lyme Regis geology","highlight Mary Anning's achievements and the prejudice she faced","teach fossil identification"],"a":2},{"n":10,"q":"Mary's story demonstrates that:","o":["science was easy for women","talent and determination can overcome obstacles","fossil hunting is dangerous work","museums do not value discoveries"],"a":1}]},{"title":"Nikola Tesla: Visionary Inventor","tag":"New","text":"Nikola Tesla arrived in New York City in 1884 with a dream and barely any money in his pocket. The Serbian-born inventor had developed a revolutionary design for an electric motor, and he believed America was the place to make his fortune.\n\nTesla first found work with Thomas Edison, the famous inventor of the light bulb. However, the partnership was short-lived. Edison believed in direct current electricity, while Tesla championed alternating current. The two men clashed over their competing visions for powering the world.\n\nAfter leaving Edison's company, Tesla struck out on his own. He partnered with businessman George Westinghouse, who recognised the potential of Tesla's alternating current system. Together, they revolutionised electrical distribution. Alternating current could transmit electricity over long distances far more efficiently than Edison's direct current.\n\nTesla's mind was restless. He dreamed of wireless transmission of electricity and created the first remote-controlled boat. He experimented with X-rays and developed technologies that prefigured modern wireless communication. His laboratories filled with strange machines and crackling experiments.\n\nYet despite his brilliance, Tesla struggled financially. He was a poor businessman and often gave away his ideas or failed to patent his inventions properly. He lived in poverty in his later years, sometimes unable to pay his hotel bills.\n\nToday, Tesla is recognised as one of history's greatest inventors. The alternating current system he developed powers virtually every home and business in the modern world. Scientists and engineers continue to study his notebooks and dreams. Though he died poor and largely forgotten, Nikola Tesla's legacy illuminates our modern world.","questions":[{"n":1,"q":"Tesla arrived in New York with:","o":["a successful business plan","sponsorship from investors","a dream and minimal money","letters of introduction"],"a":2},{"n":2,"q":"Tesla worked with Edison initially to:","o":["develop the light bulb","prove direct current was superior","advance his motor design","study electrical systems"],"a":3},{"n":3,"q":"The major disagreement between Edison and Tesla was about:","o":["who discovered electricity","direct current versus alternating current","the location of factories","patent rights"],"a":1},{"n":4,"q":"George Westinghouse partnered with Tesla because he:","o":["wanted to employ Edison","saw potential in alternating current","was Edison's competitor","needed Tesla's boat design"],"a":1},{"n":5,"q":"Alternating current was superior because it could:","o":["power brighter lights","transmit electricity over long distances more efficiently","be stored easily","work without wires"],"a":1},{"n":6,"q":"Tesla's experiments included work on:","o":["steam engines only","X-rays and wireless communication","light bulb improvements","railway locomotives"],"a":1},{"n":7,"q":"Tesla struggled financially because he was:","o":["not intelligent enough","too expensive to employ","a poor businessman who didn't patent properly","forced to work for Edison"],"a":2},{"n":8,"q":"In his later years, Tesla lived in:","o":["a mansion","poverty, sometimes unable to pay bills","Westinghouse's laboratory","Edison's household"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["explain how electricity works","compare Edison and Westinghouse","describe Tesla's genius and the tragedy of his financial struggles","promote alternating current"],"a":2},{"n":10,"q":"Tesla's legacy today is significant because:","o":["he lived in luxury","his alternating current system powers the modern world","he won many awards during his lifetime","he worked for Edison"],"a":1}]},{"title":"Jane Goodall: Champion of Chimpanzees","tag":"New","text":"When Jane Goodall was a little girl growing up in England, she dreamed of living in Africa and studying wild animals. Her determination never wavered, even when people told her that girls couldn't be scientists. At age 26, her dream finally came true. In 1960, Jane travelled to Tanzania in East Africa to study chimpanzees in their natural forest home. She didn't have a fancy laboratory or modern equipment—just a notebook, binoculars, and endless patience. What Jane discovered changed our understanding of chimpanzees forever. She watched as these intelligent animals made and used tools, something scientists had believed only humans could do. She observed them showing emotions like sadness, joy, and even playfulness. Jane saw mother chimps teaching their babies how to survive, holding their hands like human mothers do. She gave the chimpanzees names instead of numbers, treating them as individuals with their own personalities. For over 60 years, Jane has dedicated her life to protecting chimpanzees and teaching the world why they matter. She travels constantly, sharing her passion with students everywhere. Jane shows us that one person with courage and determination can make a tremendous difference. Today, her work continues to inspire millions of young people to care for our planet and all the creatures we share it with.","questions":[{"n":1,"q":"Where did Jane Goodall go to study chimpanzees?","o":["South Africa","Tanzania","Kenya","Uganda"],"a":1},{"n":2,"q":"In what year did Jane Goodall begin her chimpanzee research?","o":["1950","1955","1960","1965"],"a":2},{"n":3,"q":"What does the word 'determination' mean in this passage?","o":["Fear of failure","Firm decision to succeed","Understanding science","Love of animals"],"a":1},{"n":4,"q":"What important discovery did Jane make about chimpanzees?","o":["They could speak human languages","They made and used tools","They didn't have emotions","They couldn't be trained"],"a":1},{"n":5,"q":"Why was Jane's discovery about chimpanzee tools significant?","o":["It proved chimpanzees were smarter than humans","Scientists thought only humans could make tools","It helped chimpanzees survive better","It changed how zoos kept animals"],"a":1},{"n":6,"q":"How did Jane treat the chimpanzees differently from other scientists?","o":["She kept them in cages","She gave them names instead of numbers","She didn't let them eat fruit","She studied them from airplanes"],"a":1},{"n":7,"q":"What can we infer about Jane's childhood?","o":["She was afraid of animals","She received training at university first","She had a strong interest in nature from an early age","She didn't enjoy living in England"],"a":2},{"n":8,"q":"Which statement best describes Jane's main achievement?","o":["She created the first zoo in Tanzania","She became the first female scientist in Africa","She changed how we understand chimpanzees and inspired conservation","She taught chimpanzees to speak"],"a":2},{"n":9,"q":"What does the passage suggest about Jane's attitude toward obstacles?","o":["She gave up when things were difficult","She didn't listen to criticism","She persisted despite people doubting her","She waited for permission before starting"],"a":2},{"n":10,"q":"The author describes Jane's laboratory setup as 'not fancy.' Why does the author include this detail?","o":["To show she was poor","To demonstrate that great discoveries don't require expensive equipment","To criticize her methods","To show she wasn't a real scientist"],"a":1}]},{"title":"Frida Kahlo: Artist of the Heart","tag":"New","text":"Frida Kahlo was born in Mexico in 1907, and her life was filled with both tremendous pain and extraordinary beauty. When Frida was eighteen years old, a terrible bus accident left her with lifelong injuries. She spent months in a hospital bed, unable to move. Instead of giving up, Frida asked her mother for paints and a special mirror to mount above her bed. She began painting herself—not to look beautiful, but to show her true feelings. Frida's paintings are unforgettable. She painted with bold, vibrant colours and sometimes included magical or strange elements that didn't exist in real life. In many paintings, she showed herself with thick, dark eyebrows and direct stares that seemed to challenge the viewer. She painted her pain, her dreams, her Mexican heritage, and the natural world she loved. Her style was completely unique—no one painted quite like Frida. Throughout her life, Frida struggled with illness, but she never stopped creating art. She painted powerful images of flowers, animals, and herself as a strong person, not a victim. Her work inspired artists around the world and helped change how people viewed Mexican art. Today, Frida is celebrated as one of the greatest artists of the twentieth century. Her courage and creativity showed that our struggles can become sources of strength and inspiration. Frida proved that being different, being bold, and being authentic is something to celebrate.","questions":[{"n":1,"q":"What caused Frida's lifelong injuries?","o":["A painting accident","A bus accident","A fall from a tree","A childhood illness"],"a":1},{"n":2,"q":"Why did Frida's mother give her paints while she was in the hospital?","o":["To make her forget her pain","To keep her entertained during recovery","To help her cope with her situation and express herself","To teach her how to paint professionally"],"a":2},{"n":3,"q":"What does the word 'vibrant' mean as used in the passage?","o":["Dark and dull","Bright and lively","Slowly moving","Soft and delicate"],"a":1},{"n":4,"q":"What did Frida often paint?","o":["Only landscapes of Mexico","Only other people's portraits","Herself, her feelings, nature, and dreams","Only flowers and animals"],"a":2},{"n":5,"q":"How did Frida paint herself in her artwork?","o":["To look as beautiful as possible","To show her real feelings and thoughts","To hide her injuries","To look like other famous people"],"a":1},{"n":6,"q":"What can we infer about Frida's attitude toward her disability?","o":["She pretended it never happened","She used it as inspiration for her art","She felt ashamed and hid from people","She completely recovered from it"],"a":1},{"n":7,"q":"Which detail shows that Frida was very determined?","o":["She painted in many different styles","She used bright colours in her paintings","She continued creating art despite lifelong pain and illness","She became famous while still young"],"a":2},{"n":8,"q":"What is the main reason Frida's paintings are considered important today?","o":["They are worth a lot of money","They show unique, authentic expression and inspired changes in art","They are the easiest paintings to understand","They were the first paintings in Mexico"],"a":1},{"n":9,"q":"What does the passage suggest about Frida's self-portraits?","o":["They were meant to be pretty decorations","They were honest expressions of who she was, not attempts to look beautiful","They were copies of other artists' work","They were painted only to earn money"],"a":1},{"n":10,"q":"How did Frida's approach to art change other people's views?","o":["She convinced everyone to paint the same way","She showed that being different and authentic could be powerful and celebrated","She proved that only pain creates good art","She made Mexican art less popular"],"a":1}]},{"title":"Ernest Shackleton: Explorer of Ice","tag":"New","text":"Ernest Shackleton was born in Ireland in 1874 and grew up dreaming of adventure in distant, unexplored places. The most dangerous place on Earth fascinated him: Antarctica. In 1914, Shackleton led an expedition to do something never done before—walk all the way across Antarctica. However, his ship, the Endurance, became trapped in pack ice. The ice crushed the ship, and it sank. Shackleton and his 27 crew members found themselves stranded on floating ice in one of the world's harshest environments. Temperatures dropped far below freezing, food was scarce, and rescue seemed impossible. But Shackleton refused to panic. He kept everyone calm and hopeful. When the ice beneath them melted, he led his men to a tiny, barren island. Then he took a small boat with five men across 800 miles of the most dangerous ocean waters in the world to find help. This voyage was considered one of the greatest feats of survival ever. Against impossible odds, Shackleton and all of his crew survived. Not a single person died. Shackleton's greatest achievement wasn't reaching Antarctica—it was keeping every person alive and bringing them home. He showed incredible leadership by putting his crew's safety above his own ambition. Shackleton once said his motto was 'By endurance we conquer,' and he lived by these words. His story teaches us that courage isn't about never feeling afraid—it's about never giving up, even when things seem hopeless.","questions":[{"n":1,"q":"What was Shackleton's original goal for his 1914 expedition?","o":["To discover gold in Antarctica","To walk across Antarctica","To study penguins","To claim land for Ireland"],"a":1},{"n":2,"q":"What happened to Shackleton's ship, the Endurance?","o":["It was stolen by pirates","It was crushed and sank in pack ice","It was abandoned in Australia","It was struck by lightning"],"a":1},{"n":3,"q":"What does the word 'stranded' mean in this passage?","o":["On a beach","Stuck in one place with no way to leave","Travelling by ship","Having lots of supplies"],"a":1},{"n":4,"q":"How many crew members did Shackleton take on the dangerous boat voyage to find help?","o":["Two","Three","Five","Ten"],"a":2},{"n":5,"q":"What was remarkable about Shackleton's expedition outcome?","o":["They discovered new land","They all survived despite impossible conditions","They became famous before leaving","They found lots of gold"],"a":1},{"n":6,"q":"Why did Shackleton take a small boat across 800 miles of ocean?","o":["For fun and adventure","To escape from his crew","To find rescue and save his crew","To prove he was the bravest explorer"],"a":2},{"n":7,"q":"What can we infer about Shackleton's leadership style?","o":["He was harsh and uncaring","He kept calm, hopeful, and prioritized his crew's survival","He blamed others for problems","He wanted all the glory for himself"],"a":1},{"n":8,"q":"Which statement best summarizes Shackleton's greatest achievement?","o":["He was the first person to reach Antarctica","He kept all his crew alive in impossible conditions","He built the strongest ship ever made","He discovered three new continents"],"a":1},{"n":9,"q":"What does Shackleton's motto 'By endurance we conquer' mean?","o":["Fighting is always the answer","Giving up is sometimes good","Persisting through hardship leads to success","Money is the only goal"],"a":2},{"n":10,"q":"What lesson does the passage suggest Shackleton's story teaches us?","o":["Always be ambitious and famous","Courage means facing fears and never giving up","Antarctica is more important than people","The best leaders abandon their goals"],"a":1}]},{"title":"Katherine Johnson: Hidden Figure in Mathematics","tag":"New","text":"Katherine Johnson was born in 1918 in West Virginia, America. From childhood, she loved numbers and solving mathematics problems. She was brilliant at maths, but in the 1940s, being a Black woman in America created tremendous obstacles. Despite the racism and unfair treatment she faced, Katherine pursued her education and became a mathematician. In 1953, Katherine got a job at NASA, the American space agency. Her job was to do incredibly complex mathematical calculations to help launch rockets and spacecraft into space. Before computers existed, people called 'computers' did these calculations by hand. Katherine was one of the best. She was so accurate and clever that astronauts trusted their lives to her calculations. When NASA prepared to send John Glenn into orbit around Earth in 1962, they needed perfect mathematics. Katherine calculated the exact path his spacecraft would follow. The astronauts asked Katherine to double-check the calculations because they trusted her work completely. Her calculations were correct, and the mission succeeded. For years, Katherine's vital contributions were hidden. She wasn't recognized as an important scientist, and her achievements were forgotten by history. It wasn't until 2016 that a book and film called 'Hidden Figures' told the world about Katherine and other Black women mathematicians whose work had been overlooked. Katherine's story shows how unfair systems can try to hide the talents of brilliant people. But her determination and skill couldn't be erased. Today, Katherine is celebrated as a pioneer and her example inspires young people, especially girls, to pursue science and mathematics.","questions":[{"n":1,"q":"In what year was Katherine Johnson born?","o":["1898","1918","1938","1958"],"a":1},{"n":2,"q":"What was Katherine's main job at NASA?","o":["Building rockets","Flying spacecraft","Doing complex mathematical calculations for space missions","Training astronauts"],"a":2},{"n":3,"q":"What does the word 'obstacles' mean in this passage?","o":["Roads","Things that make something difficult or block progress","Stars","Opportunities"],"a":1},{"n":4,"q":"Why did astronaut John Glenn ask Katherine to check his spacecraft calculations?","o":["She was the only mathematician available","He didn't trust computers","He knew she was highly skilled and accurate","He wanted to make the mission harder"],"a":2},{"n":5,"q":"What problem did Katherine face because of racism and unfair treatment?","o":["She couldn't learn mathematics","Her achievements were not recognized and her contributions were hidden from history","She refused to work at NASA","She moved to another country"],"a":1},{"n":6,"q":"Why was Katherine's contribution to the 1962 space mission significant?","o":["She built the first spacecraft","Her calculations were trusted to keep astronauts safe in orbit","She discovered a new planet","She was the first woman in space"],"a":1},{"n":7,"q":"What can we infer about Katherine's character from this passage?","o":["She was lazy and avoided challenges","She was determined, brilliant, and didn't let obstacles stop her","She wanted to work alone without recognition","She didn't care about her own achievements"],"a":1},{"n":8,"q":"What event finally brought Katherine's story to public attention?","o":["She became a famous actress","A book and film called 'Hidden Figures' was released in 2016","She received an award immediately after the space mission","She wrote a book about her own life"],"a":1},{"n":9,"q":"Why is Katherine's story called 'Hidden Figures'?","o":["The story involves secret codes and numbers","Her important mathematical work and the work of other Black women were hidden from public knowledge","She worked secretly for the government","The title refers to invisible ghost astronauts"],"a":1},{"n":10,"q":"What does Katherine Johnson's story teach young people today?","o":["Girls should not do mathematics","Talent and determination can overcome unfair systems and inspire change","Only astronauts are important scientists","The past doesn't matter to the future"],"a":1}]},{"title":"Cathy Freeman: Running for Australia","tag":"New","text":"Cathy Freeman was born in Queensland, Australia, in 1973. Her mother was Australian Aboriginal and her father was white Australian. Growing up, Cathy experienced racism, but she never let it stop her from chasing her dreams. From a young age, Cathy was an exceptional runner. She was fast, determined, and had a powerful competitive spirit. She trained hard and dreamed of representing Australia at the Olympic Games. At the 1990 Commonwealth Games, teenage Cathy Freeman became a star. She won medals running for Australia, but she faced a difficult choice. Some Aboriginal Australians wanted her to represent them separately rather than as an Australian. Cathy refused to be divided. She believed that running for Australia could help bring Aboriginal and non-Aboriginal Australians together. In 1994, Cathy won the 400-metre gold medal at the Commonwealth Games, and she did something surprising—she ran her victory lap carrying both the Aboriginal flag and the Australian flag together. This powerful moment showed her belief in unity. Many Australians criticized her, but others were inspired. Finally, in 2000, Cathy achieved her greatest goal. The Olympic Games were held in Sydney, Australia, and Cathy was chosen to light the Olympic flame at the opening ceremony. Then she competed in the 400-metre race. With the whole world watching and her home nation cheering, Cathy won the gold medal. She was crying with joy and emotion. Cathy Freeman showed that courage means standing up for what you believe in, even when people disagree with you. Her Olympic victory helped many Australians see each other differently and understand the importance of inclusion and respect.","questions":[{"n":1,"q":"In what year was Cathy Freeman born?","o":["1963","1973","1983","1993"],"a":1},{"n":2,"q":"What distance did Cathy Freeman win a gold medal in at the 2000 Olympics?","o":["200 metres","400 metres","800 metres","1500 metres"],"a":1},{"n":3,"q":"What does the word 'exceptional' mean as used in this passage?","o":["Very average","Unusually excellent or outstanding","Lazy and slow","Completely ordinary"],"a":1},{"n":4,"q":"Why did Cathy Freeman light the Olympic flame at the 2000 Sydney Olympics?","o":["She was the fastest runner in the world","She was recognized as an important symbol of unity for Australia","She was the oldest athlete competing","She had won the most Olympic medals"],"a":1},{"n":5,"q":"What did Cathy Freeman's 1994 victory lap demonstrate?","o":["She disrespected Australia","She wanted to confuse people","Her belief in unity between Aboriginal and non-Aboriginal Australians","She was showing off"],"a":2},{"n":6,"q":"Why did some people criticize Cathy Freeman?","o":["She wasn't a fast runner","She wanted to run for Australia as one nation rather than separately","She refused to compete in the Olympics","She moved to another country"],"a":1},{"n":7,"q":"What can we infer about Cathy's character from her refusal to be divided?","o":["She was weak and easily influenced","She was brave, principled, and believed in inclusion","She didn't care about Aboriginal issues","She wanted to forget her heritage"],"a":1},{"n":8,"q":"Which statement best describes Cathy Freeman's most significant achievement?","o":["She was the fastest runner alive","She won more Olympic medals than anyone","She won Olympic gold and became a symbol of unity for her nation","She was the first Aboriginal Australian ever"],"a":2},{"n":9,"q":"What does the passage suggest about how Cathy handled racism?","o":["It defeated her and stopped her from running","She ignored it and let it disappear on its own","She refused to let it prevent her from pursuing her dreams","She blamed other people for it"],"a":2},{"n":10,"q":"Why was it significant that the 2000 Olympics were held in Sydney?","o":["The weather was perfect","It was Cathy's home city, making her victory especially meaningful for Australia","Olympics had never been held in Australia before","It was the first time Aboriginal people were allowed to compete"],"a":1}]}],"science":[{"title":"Coral Reefs: Rainforests of the Sea","tag":"New","text":"Coral reefs are sometimes called the \"rainforests of the sea\". Although they cover less than one per cent of the ocean floor, they support approximately 25 per cent of all known marine species. Fish, sea turtles, and thousands of invertebrates depend on reefs for food and shelter.\n\nRising ocean temperatures pose the greatest threat to coral health. When water becomes too warm, corals expel the microscopic algae that live inside their tissues. These algae, called zooxanthellae, provide corals with up to 90 per cent of their energy through photosynthesis. Without them, the coral turns white—a process known as bleaching. If temperatures remain high for several weeks, bleached corals can starve and die.\n\nScientists monitor reef health using networks of underwater cameras and temperature sensors placed along reef systems. Satellite imaging also allows researchers to track large-scale bleaching events across entire ocean regions.\n\nMost marine biologists agree that reducing carbon emissions is the single most important step for protecting reefs in the long term. Carbon dioxide released by burning fossil fuels traps heat in the atmosphere, which in turn warms the oceans.\n\nIn the shorter term, researchers are experimenting with breeding heat-resistant coral strains. By selecting corals that naturally tolerate warmer water, scientists hope to create populations that can survive the rising temperatures projected for coming decades. Early trials have shown promising results, but experts caution that no amount of selective breeding can replace the need to address the root cause: global carbon emissions.","questions":[{"n":1,"q":"Coral reefs support approximately what proportion of marine species?","o":["25 per cent","50 per cent","75 per cent","10 per cent"],"a":0},{"n":2,"q":"Bleaching occurs when corals:","o":["absorb too much sunlight","grow in deep water","expel their algae","are covered by sand"],"a":2},{"n":3,"q":"Without zooxanthellae, corals lose their main source of:","o":["water","shelter","movement","energy"],"a":3},{"n":4,"q":"The word \"expel\" most closely means:","o":["attract","force out","protect","dissolve"],"a":1},{"n":5,"q":"Scientists monitor reef health using:","o":["fishing nets and boats","underwater cameras and sensors","coral breeding tanks","fossil fuel detectors"],"a":1},{"n":6,"q":"According to the passage, the key driver of ocean warming is:","o":["underwater volcanoes","algae overgrowth","carbon emissions from fossil fuels","satellite equipment"],"a":2},{"n":7,"q":"Heat-resistant coral strains are created by:","o":["genetic engineering in laboratories","adding chemicals to the water","painting corals white","selecting naturally tolerant corals"],"a":3},{"n":8,"q":"The tone of this passage is best described as:","o":["humorous and light","informative and concerned","angry and accusatory","fictional and imaginative"],"a":1},{"n":9,"q":"The main purpose of the passage is to:","o":["promote coral tourism","explain coral bleaching and its causes","describe underwater camera technology","compare different ocean species"],"a":1},{"n":10,"q":"The passage implies that reef survival ultimately depends on:","o":["building more sensors","breeding all corals in tanks","reducing global carbon emissions","increasing ocean temperatures"],"a":2}]},{"title":"The Monarch Butterfly Migration","tag":"New","text":"Every autumn, millions of monarch butterflies embark on one of nature's most remarkable journeys. Beginning in Canada and the northern United States, these fragile creatures fly thousands of kilometres south to Mexico, seeking the warmth and resources they need to survive the winter.\n\nHow do the monarchs know where to go? Scientists have discovered that these butterflies navigate using a combination of the sun's position and Earth's magnetic field. This internal compass guides them across unfamiliar territory, even though most monarchs making the journey have never completed the migration before. It is a behaviour passed down through their genes.\n\nThe migration is a physical ordeal. Monarchs must fly for several months, covering up to 160 kilometres per day. They stop only to feed on nectar and rest. Many do not survive the journey. Predators, storms, and exhaustion claim countless lives.\n\nOnce they reach their destination in the Mexican forests, monarchs cluster together on trees, covering branches and trunks in a blanket of orange and black. They enter a state of dormancy, conserving energy until spring, when the cycle begins again.\n\nToday, the monarch migration faces serious threats. Habitat loss in both Canada and Mexico has destroyed the meadows and forests that monarchs depend on. Climate change brings unpredictable weather that can devastate populations. A plant called milkweed is essential for monarch caterpillars, yet it is disappearing due to agricultural development and herbicide use.\n\nConservationists are working to protect monarch habitats by planting milkweed and creating wildlife corridors. Many people in North America are planting milkweed gardens to support the monarchs. These efforts offer hope that future generations will continue to witness this extraordinary natural spectacle.","questions":[{"n":1,"q":"The monarch migration occurs mainly:","o":["in spring","during summer","in autumn","in winter"],"a":2},{"n":2,"q":"Monarchs navigate using:","o":["memory of previous journeys","signals from other butterflies","the sun's position and Earth's magnetic field","markings on trees"],"a":2},{"n":3,"q":"Most monarch butterflies migrating south:","o":["have made the journey before","are guided by older butterflies","have never completed this migration before","learn from their parents"],"a":2},{"n":4,"q":"The distance monarchs can fly per day is:","o":["50 kilometres","160 kilometres","300 kilometres","100 kilometres"],"a":1},{"n":5,"q":"In Mexican forests, monarchs:","o":["hibernate in caves","cluster together and enter dormancy","continue flying south","breed and lay eggs"],"a":1},{"n":6,"q":"Milkweed is important because:","o":["monarchs eat its nectar only","it attracts predators away","monarch caterpillars depend on it","it guides their migration"],"a":2},{"n":7,"q":"The main threat to monarchs today is:","o":["predators such as birds","habitat loss and climate change","too much rain","excessive sun exposure"],"a":1},{"n":8,"q":"The tone when describing the migration's hardships is:","o":["unconcerned","hopeful and celebratory","serious and respectful of the challenge","critical and doubtful"],"a":2},{"n":9,"q":"The purpose of this passage is mainly to:","o":["teach butterfly identification","explain the monarch migration and its threats","describe Mexican forests","criticise agricultural practices"],"a":1},{"n":10,"q":"Planting milkweed gardens helps monarchs by:","o":["providing shade","reducing migration distance","creating food sources for caterpillars","attracting more predators"],"a":2}]},{"title":"Earthquakes: Measuring Earth's Tremors","tag":"New","text":"An earthquake occurs when tectonic plates—enormous pieces of Earth's crust—suddenly shift and release energy. These plate movements happen constantly, but most are too small for humans to feel. When a major plate shift occurs, however, the energy released can shake buildings, rupture roads, and alter landscapes permanently.\n\nTo measure earthquakes, scientists use instruments called seismographs. These sensitive devices detect and record the vibrations caused by earthquakes. The recordings produced by seismographs are called seismograms, and they show the magnitude and intensity of the shaking.\n\nEarthquakes produce two main types of seismic waves: P-waves and S-waves. P-waves, or primary waves, are the fastest and arrive first at monitoring stations. They compress the ground like an accordion. S-waves, or secondary waves, arrive later and cause the ground to shake side to side. S-waves are slower but often cause more damage because of their sideways motion.\n\nFor many years, scientists used the Richter scale to measure earthquake magnitude. This scale rates earthquakes from 1 to 10, with higher numbers indicating stronger shaking. However, scientists realised the Richter scale had limitations for very large earthquakes. Modern seismologists now use the moment magnitude scale, which provides more accurate measurements, especially for powerful earthquakes.\n\nEarthquakes can trigger tsunamis, landslides, and fires. In populated areas, they cause tremendous destruction and loss of life. However, scientists cannot predict exactly when earthquakes will occur. What they can do is improve building design and develop early warning systems. These systems detect earthquakes within seconds and can provide precious warning time—sometimes only seconds, but enough to alert people to take shelter before strong shaking arrives.","questions":[{"n":1,"q":"Tectonic plates cause earthquakes when they:","o":["absorb water","suddenly shift and release energy","collide slowly over months","rotate in place"],"a":1},{"n":2,"q":"Seismographs are used to:","o":["predict earthquakes","detect and record earthquake vibrations","measure temperature changes","study ocean waves"],"a":1},{"n":3,"q":"P-waves are called \"primary\" because they:","o":["are the largest waves","arrive first at monitoring stations","cause the most damage","are the slowest"],"a":1},{"n":4,"q":"S-waves are often more damaging than P-waves because:","o":["they arrive first","they travel faster","they cause side-to-side motion","they compress the ground"],"a":2},{"n":5,"q":"The Richter scale was eventually supplemented by the moment magnitude scale because:","o":["it was too complicated","it had limitations for very large earthquakes","scientists preferred different numbers","it could not measure small earthquakes"],"a":1},{"n":6,"q":"Earthquakes can trigger:","o":["rain and snow only","tsunamis, landslides, and fires","changes to seasons","shifts in star positions"],"a":1},{"n":7,"q":"Early warning systems provide earthquake alerts by:","o":["predicting earthquakes weeks in advance","detecting earthquakes within seconds","monitoring weather patterns","measuring plate movement"],"a":1},{"n":8,"q":"The passage suggests that predicting earthquakes is:","o":["easily accomplished","currently impossible with certainty","a recent scientific achievement","less important than other research"],"a":1},{"n":9,"q":"The main purpose of this passage is to:","o":["describe earthquake damage","explain how earthquakes are measured and detected","promote building safety codes","compare different seismic scales"],"a":1},{"n":10,"q":"Warning time from early warning systems is valuable because:","o":["it allows evacuation over hours","it provides seconds to take shelter","it predicts earthquake magnitude","it stops earthquakes from occurring"],"a":1}]},{"title":"How Volcanoes Work","tag":"New","text":"Deep beneath the Earth's surface lies a hot, melted rock called magma. The Earth's crust is divided into large pieces called tectonic plates that constantly move very slowly. Where these plates meet, incredible pressure and heat build up. When the pressure becomes too great, the magma is forced upward through cracks in the Earth's crust. When magma reaches the surface, it's called lava. As lava cools and hardens, it forms new rock.\n\nVolcanoes form in three main ways. At spreading boundaries, two plates move apart and magma rises between them. At subduction zones, one plate slides beneath another, creating intense heat that melts rock. Hot spots are areas deep in the Earth where magma plumes rise, creating volcanoes as the plates move over them. The Hawaiian Islands were formed this way.\n\nVolcanic eruptions can be calm or explosive, depending on the type of magma. Thin, runny lava flows easily and creates gentle eruptions. Thick, sticky lava doesn't flow as easily, so pressure builds up and causes violent explosions. Some famous eruptions include Mount Vesuvius in Italy, which buried the city of Pompeii in 79 AD, and Mount St. Helens in Washington State, which erupted explosively in 1980.\n\nVolcanoes aren't just destructive. Volcanic soil is extremely fertile, making it perfect for growing crops. Geothermal energy from volcanic heat can be used to generate electricity. Volcanoes also create new land as lava cools and hardens. Scientists carefully monitor active volcanoes to predict eruptions and keep people safe.","questions":[{"n":1,"q":"What is the name for melted rock beneath the Earth's surface?","o":["Lava","Magma","Ash","Pumice"],"a":1},{"n":2,"q":"What are the large pieces of Earth's crust called?","o":["Crystals","Tectonic plates","Fault lines","Continents"],"a":1},{"n":3,"q":"Why does volcanic soil make good farmland?","o":["It is very cold","It contains many minerals and is fertile","It never needs water","It repels insects"],"a":1},{"n":4,"q":"What happens when magma reaches Earth's surface?","o":["It freezes immediately","It's called lava","It returns underground","It turns to ash"],"a":1},{"n":5,"q":"Which type of lava causes more violent eruptions?","o":["Thin and runny lava","Hot lava","Thick and sticky lava","Cold lava"],"a":2},{"n":6,"q":"What caused the Hawaiian Islands to form?","o":["Spreading boundaries","Subduction zones","Hot spots as plates moved over them","Earthquakes"],"a":2},{"n":7,"q":"Mount Vesuvius buried which ancient city in 79 AD?","o":["Rome","Athens","Pompeii","Herculaneum"],"a":2},{"n":8,"q":"Based on the passage, which statement is true?","o":["All volcanoes are dangerous and serve no purpose","Volcanoes only create destruction","Volcanoes can be useful for energy and creating new land","Volcanic eruptions happen daily"],"a":2},{"n":9,"q":"What does 'geothermal energy' mean as used in the passage?","o":["Energy from the sun","Energy from volcanic heat beneath the Earth","Energy from wind","Energy from water"],"a":1},{"n":10,"q":"Why do scientists monitor active volcanoes?","o":["To study rocks","To predict eruptions and keep people safe","To collect lava samples","To stop all eruptions"],"a":1}]},{"title":"The Water Cycle","tag":"New","text":"Water is constantly moving around our planet in an endless cycle. This process, called the water cycle, is essential for all life on Earth. The water cycle has four main stages: evaporation, condensation, precipitation, and collection.\n\nThe first stage is evaporation. Heat from the sun causes water in oceans, lakes, and rivers to turn into an invisible gas called water vapor. This water vapor rises into the atmosphere. Plants also release water through their leaves in a process called transpiration. Together, evaporation and transpiration are sometimes called evapotranspiration.\n\nNext comes condensation. As water vapor rises high into the atmosphere, it becomes cooler. When water vapor cools, it turns back into tiny water droplets. These droplets cluster together to form clouds. The temperature at which water vapor turns into liquid is called the dew point.\n\nThe third stage is precipitation. When clouds become heavy with water droplets, they fall back to Earth as rain, snow, sleet, or hail. The type of precipitation depends on the temperature. If it's cold, snow falls. If it's warmer, rain falls.\n\nFinally, collection occurs. Water that falls on land flows into rivers and streams, eventually reaching oceans and lakes. Some water soaks into the ground, becoming groundwater. This groundwater can be used by plants and animals, or it slowly flows to the ocean. The cycle then begins again when the sun's heat causes evaporation.","questions":[{"n":1,"q":"What are the four main stages of the water cycle?","o":["Rain, snow, wind, sun","Evaporation, condensation, precipitation, collection","Freezing, melting, boiling, cooling","Clouds, water, land, sky"],"a":1},{"n":2,"q":"What causes water to evaporate from oceans and lakes?","o":["Wind","Cold air","Heat from the sun","Clouds"],"a":2},{"n":3,"q":"What is the invisible gas that rises into the atmosphere during evaporation?","o":["Oxygen","Nitrogen","Water vapor","Carbon dioxide"],"a":2},{"n":4,"q":"What term describes water released by plants through their leaves?","o":["Evaporation","Transpiration","Precipitation","Condensation"],"a":1},{"n":5,"q":"How do clouds form?","o":["Water falls from the sky","Water vapor cools and turns into droplets","The sun heats water","Wind pushes water upward"],"a":1},{"n":6,"q":"What is the dew point?","o":["The lowest point on a leaf","The temperature at which water vapor turns into liquid","The amount of rain that falls","The height of clouds"],"a":1},{"n":7,"q":"When is snow more likely to fall than rain?","o":["During summer","When clouds are light","When the temperature is cold","During windy days"],"a":2},{"n":8,"q":"What happens to water that soaks into the ground?","o":["It evaporates immediately","It becomes groundwater","It flows to the sky","It turns to ice"],"a":1},{"n":9,"q":"Based on the passage, why is the water cycle important?","o":["It keeps clouds in the sky","It is essential for all life on Earth","It prevents floods","It creates weather patterns only"],"a":1},{"n":10,"q":"Which statement best describes the water cycle?","o":["Water moves one way from oceans to clouds","Water moves in an endless cycle from Earth to atmosphere and back","Water only moves during rain","Water stops moving once it reaches the ocean"],"a":1}]},{"title":"The Human Immune System","tag":"New","text":"Your body has an incredible defense system called the immune system. This system protects you from harmful invaders like bacteria, viruses, and other pathogens. Without your immune system, even small infections could make you very sick.\n\nThe immune system has several parts. White blood cells are like soldiers that patrol your body looking for invaders. When they find bacteria or viruses, they attack and destroy them. Lymph nodes are small organs throughout your body that produce and filter white blood cells. Your thymus gland helps white blood cells mature and become strong. The spleen also stores white blood cells and helps fight infections.\n\nThere are different types of white blood cells, each with special jobs. Phagocytes surround and destroy harmful invaders by eating them. Lymphocytes include T cells and B cells. T cells find and destroy infected cells. B cells make antibodies, which are special proteins that recognize and neutralize pathogens. Once B cells recognize a pathogen, they remember it. This is why getting sick once can prevent you from getting the same illness again.\n\
